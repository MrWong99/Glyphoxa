# LLM cassette (ADR-0021): the tool-use-loop scenario — the most important
# thing this cassette pins is tool-call ROUTING.
#
# Two exchanges, one per Provider.Complete call the tool-use loop makes:
#   1. The model, shown the dice Tool, emits a tool_call for it (stop=tool_use).
#      The loop executes the REAL dice tool (seeded rng → "Rolled 1d20: 8.") and
#      feeds the result back.
#   2. With the result in context, the model returns the final spoken text.
#
# Each is keyed by prompt_hash. The second hash depends on the first exchange's
# tool_call id ("toolu_roll1") and args AND on the live dice result, so those
# must replay verbatim — change any and exchange 2 misses. Both hashes pin model
# "llama-3.3-70b-versatile" (Groq, the production LLM per ADR-0036). Re-record
# against the live Groq API with `-tags=record` (GROQ_API_KEY supplies
# credentials; the dice seed stays fixed in the test).
exchanges:
  - prompt_hash: f95da03d0b253bde411523d540677e72099284dba06ef137d64bfbbd9875fc98
    tool_calls:
      - id: toolu_roll1
        name: dice
        input: '{"count":1,"sides":20}'
    stop_reason: tool_use
  - prompt_hash: 332b372ab31d70e03a8625f4ce9e18d0da515e7b0b04a9905ec4c7f5ebc1e882
    text: "The bones favor you tonight, traveler."
    stop_reason: end_turn
notes: Hand-authored fixture for the tool-use-loop replay test; prompt_hashes pin model llama-3.3-70b-versatile (Groq); dice rng seeded PCG(42,99), first draw. Both hashes include the #399 dice-hardening instruction the armed turn appends to the system prompt (the utterance "Roll a d20 for my luck" arms the dice gate), so they reflect the hardened system message.
