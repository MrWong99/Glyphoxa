intent: |
  Single-utterance fixture for the foundational TB1 tracer bullet.
  A GM addresses the Butler ("Glyphoxa") and asks for a perception
  check — exercises VAD on a clean speech-after-silence onset and,
  in later slices, address detection (target = Butler) and tool
  invocation (rules.lookup or dice.roll).

  The [pause] audio tag introduces a short silence mid-utterance,
  which is useful but not load-bearing for TB1 itself.

expected_outcome: |
  Silero VAD should detect speech onset within the first ~200ms of
  audible content and emit exactly one VADSpeechStart, followed by
  VADSpeechContinue events through the body of the utterance, and a
  single VADSpeechEnd when the GM finishes speaking. The [pause] tag
  may briefly drop probability but should not fall below the silence
  threshold long enough to trigger a speech-end transition.
