{{/*
App Secret. Holds the Postgres password, the assembled (or operator-supplied)
GLYPHOXA_DATABASE_URL, the GLYPHOXA_SECRET credential-cipher key (ADR-0004), the
shared runtime Discord token + three provider keys (DISCORD_BOT_TOKEN,
ELEVENLABS_API_KEY, GEMINI_API_KEY, GROQ_API_KEY) the voice/web pods read, and —
when the web Deployment is enabled — the three Discord OAuth credentials, the
operator allowlist (discord-oauth-client-id/-secret/-redirect-url, operator-ids)
the Web Instance boots with (ADR-0041), and the Admission Mode pair
(admission-mode, signup-plan-slug — GLYPHOXA_ADMISSION_MODE /
GLYPHOXA_SIGNUP_PLAN_SLUG, ADR-0055) that decides whether that allowlist is the
admission gate or, in `open` mode, the platform-admin list beside self-signup.
Postgres reads `password`; the migrate Job reads `database-url`; the seed Job
(#35) reads `database-url` and `app-secret`; the voice Deployment (#36) reads
`database-url` and the four shared credential keys (NOT `app-secret` — it never
decrypts the sealed placeholders); the web Deployment (#118) reads
`database-url`, `app-secret` (its RPC layer DOES decrypt BYOK credentials), the
four shared keys, the four web keys, and the Admission Mode pair. Keeping them
in one Secret means the URL, the role password, and the keys can never drift
apart and the app's secrets stay in one place — and the web pod's
checksum/secret annotation rolls it whenever any of them (the admission posture
included) changes.

The shared credential keys are emitted when EITHER voice.enabled or web.enabled,
and the web keys when web.enabled; each is `required` under its gate, so a deploy
can never start with an empty Discord token, provider key, OAuth credential, or
an empty operator allowlist. One deliberate exception (ADR-0055): in the `open`
Admission Mode `operator-ids` may be empty — it is the platform-admin list, not
the admission gate — but the key still renders (as "") so the web Deployment's
secretKeyRef never fails pod start; `signup-plan-slug` must be non-empty then
instead. A migrate/seed-only install (both disabled) needs none of them and
renders without them.

stringData (kubelet base64-encodes it) over data so the values stay reviewable
in `helm template` output and assertable in helm-unittest.

It is a pre-install/pre-upgrade hook (weight -10) like the Postgres it backs, so
it exists before the migrate hook (weight -5) and seed hook (weight -4) read
from it. The hooks run before any serving workload, and a pre-install hook
resource is created before those serving (non-hook) resources too, so they also
find it.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "glyphoxa.secretName" . }}
  labels:
    {{- include "glyphoxa.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ include "glyphoxa.dbHookWeight" . | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- include "glyphoxa.secretStringData" . | nindent 2 }}
