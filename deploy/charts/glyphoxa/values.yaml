# Glyphoxa Helm values — pgvector Postgres + migrate hook + seed Job (ADR-0034)
# and the voice-mode Deployment (#36) that serves the seeded NPC in a Discord
# voice channel.

# The single Glyphoxa image (ADR-0034). `tag` defaults to the chart appVersion
# when left empty so a chart bump pins a matching image.
image:
  repository: ghcr.io/mrwong99/glyphoxa
  tag: ""
  pullPolicy: IfNotPresent

# The single app secret (ADR-0004): a base64-encoded 32-byte credential-cipher
# key. The seed Job reads it as GLYPHOXA_SECRET to seal the placeholder provider
# credentials it writes to the DB (the real provider keys live in env/the OS
# keyring, NOT the DB). The voice Deployment does NOT read it — it never decrypts
# those placeholders. There is no default: an unset value fails the render so a
# deploy can never silently run on a weak or shared key. Generate one with
# `openssl rand -base64 32`. For real deploys, prefer templating it from an
# external Secret over committing it to values.
appSecret: ""

# Runtime credentials the voice Deployment (#36) reads from the app Secret. The
# voice pod reads DISCORD_BOT_TOKEN to join the gateway and the three provider
# keys at request time (BYOK, ADR-0004): ELEVENLABS_API_KEY (STT + TTS),
# GEMINI_API_KEY, and GROQ_API_KEY (LLM). They are stored in the Secret, never
# baked into the image (ADR-0034). The bot token is required whenever voice or
# web is enabled — the pod joins the gateway with it. The three provider keys
# are only the env FALLBACK of the hybrid BYOK policy (ADR-0004/ADR-0039):
# leave them empty for a BYOK deployment where Tenants bring their own keys via
# Provider Configs; fill them only if this deployment itself provides managed
# provider usage (platform keys, ADR-0054). A migrate/seed-only install
# (voice + web disabled) needs none of them. For real deploys, prefer
# templating them from an external Secret over committing them to values.
discordBotToken: ""
elevenLabsApiKey: ""
geminiApiKey: ""
groqApiKey: ""

# Embeddings endpoint override (ADR-0011). Glyphoxa v1.0 embeds through Ollama
# ONLY, and the binary's built-in endpoint is loopback (http://127.0.0.1:11434)
# — which can never work from inside a pod: the container ships no Ollama. Set
# this to a reachable Ollama server (serving nomic-embed-text) to enable
# semantic memory (L2): the embedding backfill worker and NPC memory recall
# both dial it. Left empty, no GLYPHOXA_OLLAMA_URL env is emitted, the pods
# keep the loopback default, and embeddings stall with a WARN loop while
# everything else keeps working. Not a secret — rendered as a plain env value
# on the web and voice pods (one shared value, so split-mode deployments keep
# a single endpoint of record).
# k3d example (Ollama on the host): http://host.k3d.internal:11434
ollamaUrl: ""

# DB connection. By default the chart stands up its own in-cluster Postgres and
# assembles the connection URL against that Service. Set `database.url` to point
# the migrate Job (and later the serving workloads) at an external Postgres
# instead; when set, the bundled Postgres can be disabled via `postgres.enabled`.
database:
  # Full DSN. Leave empty to have the chart assemble one from the values below
  # against the in-cluster Postgres Service.
  url: ""
  name: glyphoxa
  user: glyphoxa
  # Password for the in-cluster Postgres role and the assembled URL. CHANGE THIS
  # for any real deploy — or better, template it from an external Secret. A
  # static default keeps `helm install` zero-ceremony for local/dev clusters.
  password: glyphoxa
  sslmode: disable

# In-cluster pgvector Postgres (a plain StatefulSet, NOT the CNPG operator —
# ADR-0034 scopes the operator out of slice 1).
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg17
    pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    size: 8Gi
    # storageClassName: ""  # use the cluster default when unset
  resources: {}

# Migrate hook Job (ADR-0031: `glyphoxa migrate up`, advisory-locked). Runs as a
# Helm pre-install/pre-upgrade hook before any serving workload.
migrate:
  # Negative hook-weight orders the migration ahead of the non-hook serving
  # workloads (which apply at weight 0 / after hooks).
  hookWeight: -5
  resources: {}

# Seed hook Job: `glyphoxa seed` loads the demo Tenant/Campaign/NPC (+
# provider_configs) the voice mode (#36) loads by default. Runs as a Helm
# pre-install/pre-upgrade hook. The seed is idempotent on the demo Tenant name,
# so re-running on upgrade neither errors nor duplicates data.
seed:
  # Enable/disable the seed Job. On by default so the demo NPC is present for the
  # voice workload; set false for clusters that load NPCs by other means.
  enabled: true
  # -4 sorts AFTER the migrate Job (-5), so the schema is current before seeding,
  # yet still ahead of the non-hook serving workloads at weight 0.
  hookWeight: -4
  resources: {}

# Plan-catalog sync hook Job (ADR-0054): the SaaS subscription tiers as
# declarative chart values, synced into the DB by `glyphoxa billing plans-sync`
# on every install/upgrade. OFF by default — a pure-BYOK self-host needs no
# plans. Enabling it makes tiers pure config: edit `catalog`, `helm upgrade`,
# done. Tenants are bound to plans with `glyphoxa billing subscribe`, and cost/
# revenue read out via `glyphoxa billing report` (docs/deploy/saas-operations.md).
plans:
  enabled: false
  # -3 sorts AFTER migrate (-5) and seed (-4), so the plan tables exist and any
  # demo data is in place, yet still ahead of the serving workloads at weight 0.
  # The catalog ConfigMap renders at this weight minus one.
  hookWeight: -3
  # Archive plans absent from the catalog on sync (never deletes — running
  # subscriptions keep resolving their plan). Leave false to let removed tiers
  # linger active until explicitly archived.
  archiveMissing: false
  resources: {}
  # The catalog itself, in the `glyphoxa billing plans-sync` JSON shape
  # (authored as YAML here, rendered to JSON in the ConfigMap). slug is the
  # stable handle syncs upsert by; key_source 'platform' marks a tier whose
  # subscription includes provider usage on the DEPLOYMENT's keys (the
  # elevenLabsApiKey/groqApiKey/geminiApiKey values above — ADR-0054), 'byok'
  # (the default) a tier where Tenants bring their own. included_usage_usd is
  # the monthly estimated-USD allowance a platform tier includes; limits is a
  # free-form knob bag consumers read known keys from. Example:
  #   catalog:
  #     plans:
  #       - slug: byok-free
  #         display_name: BYOK Free
  #         monthly_price_usd: 0
  #       - slug: all-inclusive
  #         display_name: All Inclusive
  #         description: Groq + ElevenLabs usage included
  #         monthly_price_usd: 20
  #         key_source: platform
  #         included_usage_usd: 15
  #         limits:
  #           max_campaigns: 10
  catalog:
    plans: []

# Voice-mode Deployment (#36): the single image run as `glyphoxa -mode voice`,
# joining one Discord guild+channel and giving the seeded NPC a live voice loop.
# It is a plain (non-hook) workload, so it applies after the migrate (-5) and
# seed (-4) hooks — the schema is current and the NPC seeded before it starts.
# It never migrates: EnsureCurrent (#32) fails the pod fast if the schema is
# behind, rather than auto-migrating under a serving process.
voice:
  # Enable/disable the voice Deployment. ON by default, so a bare `helm install`
  # serves the NPC — which means it requires guild/channel plus the four
  # credential values above, or the render fails fast with an actionable message
  # (a voice pod can't run without them). For the DB-prep path only (migrate +
  # seed, no live Discord/provider keys), set this false.
  enabled: true

  # Discord guild (server) and voice channel snowflake IDs the bot joins. Both
  # are required when voice.enabled; the render fails if either is empty so a
  # voice pod can never start with the `-guild`/`-channel` flags unset.
  #
  # QUOTE THEM. A snowflake is a 64-bit ID that loses precision as a float, so a
  # bare number (`--set voice.guild=111...`, or a YAML value without quotes) is
  # silently truncated. The render rejects a non-string value with an actionable
  # error; supply a quoted YAML string (guild: "111...") or use `--set-string`.
  guild: ""
  channel: ""

  # Single replica, by intent: voice is stateful per channel (one gateway
  # connection and one channel join), so two replicas would fight over the same
  # voice channel. Not surfaced as a tunable — scaling out is a design change,
  # not a value.

  # Optional per-workload image override. When repository/tag are set here they
  # win over the shared top-level `image`; otherwise the voice pod runs the same
  # image as the migrate/seed Jobs (the common case — one image, ADR-0034).
  image:
    repository: ""
    tag: ""

  # The voice node's metrics-only HTTP listener (ADR-0032): /metrics for scraping
  # plus the /healthz liveness and /readyz readiness probes (#33). The port is
  # named `metrics` on the container and advertised via prometheus.io/* pod
  # annotations for annotation-based scrape discovery (no operator CRD required).
  metricsPort: 9090

  # Resource requests/limits for the long-lived serving pod. The Silero VAD and the
  # audio path are not free, so both are set; tune for your cluster.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Container securityContext for the voice container, hardened by default and
  # overridable. The image runs as USER 65532 (#31, scratch since #468) and the
  # VAD is embedded in the binary (pure Go), so nothing writes at boot and the
  # locked-down defaults hold —
  # readOnlyRootFilesystem included: the k3d e2e confirmed the pod boots to
  # /readyz=200 with a read-only rootfs (no boot-time write to /tmp or elsewhere).
  # Set to {} (in a values file) to disable, or override individual fields for a
  # cluster with a stricter or looser policy.
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Probe tuning. Liveness targets /healthz (process-up, ignores DB health so a
  # DB blip can't get the pod killed); readiness targets /readyz (DB ping — 200
  # only when the schema is current and reachable). initialDelaySeconds gives the
  # boot path (pool open → EnsureCurrent → NPC load → Discord join) room before
  # the first probe.
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# Web Instance (#118, ADR-0039): the single image run as `glyphoxa -mode web`
# (or `all`), serving the operator console (SPA) + the Connect API behind a
# Discord-OAuth gate. Like voice it is a plain (non-hook) workload, so it applies
# after the migrate (-5) and seed (-4) hooks — the schema is current and the demo
# data seeded before it starts — and it NEVER migrates (EnsureCurrent fails the
# pod fast if the schema is behind). Unlike voice it also gets a Service (it is
# k8s-reachable) and reads GLYPHOXA_SECRET (its RPC layer decrypts BYOK provider
# credentials for Provider Config CRUD, ADR-0004) — which voice never does.
web:
  # Enable/disable the Web Instance (Deployment + Service). ON by default so a
  # bare `helm install` serves the operator console — which means it requires the
  # three Discord OAuth credentials AND a non-empty operator allowlist below
  # (ADR-0041): a Web Instance REFUSES TO BOOT without a usable login, so those
  # four values are `required` when web.enabled and the render fails fast with an
  # actionable message if any is empty (mirroring voice's required guild/channel).
  # For a DB-prep-only or voice-only install, set this false.
  enabled: true

  # Process Mode (ADR-0005). `web` serves the console + Connect API only; `all`
  # ADDITIONALLY drives the voice loop in-process so the Session screen can
  # start/stop a live NPC in the same pod (ADR-0039). Cross-pod session control
  # across a SEPARATE Voice Instance is DEFERRED — the control-RPC transport is
  # not built — so `all` is a single-pod arrangement, not a multi-replica
  # backplane. Must be `web` or `all`; any other value fails the render.
  mode: web

  # Discord OAuth application credentials (ADR-0016/0039) and the mandatory
  # operator allowlist (ADR-0041). clientId, clientSecret and operatorIds are
  # REQUIRED when web.enabled — a Web Instance refuses to boot without a usable
  # login, so the render fails fast if any is empty. `operatorIds` is a
  # comma/whitespace-separated list of Discord User snowflakes (Developer Mode →
  # Copy ID); a Discord User whose snowflake is absent is rejected before any
  # session is issued or Tenant written. Intended use is a single entry; multiple
  # entries are a documented edge (e.g. a second test account). For real deploys,
  # prefer templating these from an external Secret over committing them to values.
  oauth:
    clientId: ""
    clientSecret: ""
    # The Discord OAuth redirect URL registered on the application. An explicit
    # value here ALWAYS wins — set it for a self-host deploy with no Ingress, or
    # to override the derived value when an external LB terminates TLS in front of
    # a plain-HTTP Ingress (#121). Leave it empty with ingress.enabled to have it
    # DERIVED from ingress.host + /auth/discord/callback. Required (fails the
    # render) only when both this is empty AND the Ingress is disabled.
    redirectUrl: ""
  operatorIds: ""

  # Admission Mode (ADR-0055): who may complete the Discord OAuth login.
  # `allowlist` (the default) is exactly ADR-0041 — only the operatorIds
  # snowflakes above are admitted, and a non-empty list is required. `open`
  # admits ANY Discord User who completes OAuth: each signup founds a fresh
  # Tenant (create-only — a stranger can never claim the operator's seeded
  # Tenant), and the allowlist above is RE-SCOPED to the deployment's
  # platform-administration list rather than the admission gate, so it may then
  # be empty (the pod boots with a loud "no platform admins" warning). The
  # OAuth credentials above stay REQUIRED in both modes — OAuth is the signup
  # mechanism. Must be `allowlist` or `open`; any other value fails the render
  # (the binary refuses to boot on an ambiguous posture).
  admissionMode: allowlist

  # The Plan slug every open-mode signup is bound to at Tenant creation
  # (GLYPHOXA_SIGNUP_PLAN_SLUG, ADR-0055). REQUIRED when admissionMode is
  # `open` — the render fails fast, mirroring the binary's fatal open-mode boot
  # preflight — and it must name a synced, non-archived plan: include it in
  # `plans.catalog` above with plans.enabled=true so the plans-sync hook has
  # put it in the DB before the web pod boots. Ignored in `allowlist` mode.
  signupPlanSlug: ""

  # Process-wide cap on concurrent live Voice Sessions (GLYPHOXA_MAX_VOICE_SESSIONS,
  # #488, ADR-0057's per-process K). At most one live session per Tenant; this caps
  # how many Tenants' sessions run at once. A start beyond it is refused with a
  # distinct, user-visible error (mapped to Connect ResourceExhausted).
  #
  # RELEASE GATE: the default 1 keeps today's single-session behaviour BYTE-IDENTICAL
  # — nothing about a stock deploy changes. Raising it >1 turns on true concurrency.
  # The web-tier reads are Tenant-scoped for this: the CampaignService live-first
  # Active-Campaign pivot resolves the caller's OWN Tenant session (not an arbitrary
  # one) and the archive/delete guard scans ALL sessions (#488). Prerequisites named
  # in ADR-0057 are satisfied: per-tenant Discord clients (#489) + per-tenant GM
  # scoping (#490) are merged. It is still SOAK-GATED for DAVE/central-token deploys
  # (#493) — raise it only once the soak passes for your deployment shape. Values <1
  # are treated as 1 by the binary.
  maxVoiceSessions: 1

  # Single replica for v1.0 (ADR-0039): the self-host web tier holds sessions
  # in-process, and cross-pod session control is deferred, so this is pinned to
  # one pod. The update strategy tracks the Mode: `web` uses RollingUpdate (no
  # in-process loop, so an upgrade surge is harmless), while `all` uses Recreate
  # like voice — it drives a session loop in-process, so two pods would run two
  # loops on one Discord token AND a surged pod's boot-time orphan sweep would
  # close the old pod's live session. Scaling out is a design change (a session
  # backplane), not a value.

  # Optional per-workload image override. When repository/tag are set here they
  # win over the shared top-level `image`; otherwise the web pod runs the same
  # image as the migrate/seed Jobs and the voice pod (one image, ADR-0034).
  image:
    repository: ""
    tag: ""

  # The public Connect API + console port the container serves on (-web-addr) and
  # the Service targets. Named `http` on the container to keep it distinct from
  # the internal `metrics` port.
  port: 8080

  # The Service that exposes the public `http` port in-cluster. ClusterIP by
  # default (Ingress/TLS is issue #121); `port` is the Service's own port, which
  # targets the container's named `http` port.
  service:
    type: ClusterIP
    port: 80

  # The metrics-only HTTP listener (ADR-0032): /metrics for scraping plus the
  # /healthz liveness and /readyz readiness probes (-metrics-addr). Kept OFF the
  # public API port — the probes and scrape target this internal port, never the
  # externally-reachable `http` port. Named `metrics` and advertised via
  # prometheus.io/* pod annotations for annotation-based scrape discovery.
  metricsPort: 9090

  # Resource requests/limits for the serving pod. Lighter than voice by default
  # (no VAD / audio path in web-only Mode); tune up for `all` Mode, which
  # runs the voice loop in-process.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # Container securityContext, hardened by default and overridable. The image
  # runs as USER 65532 (#31); the web tier writes nothing to its rootfs at boot,
  # so a read-only rootfs holds. Set to {} in a values file to drop the block.
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Probe tuning. Liveness targets /healthz (process-up, ignores DB health so a
  # DB blip can't get the pod killed); readiness targets /readyz (DB ping — 200
  # only when the schema is current and reachable). Both hit the internal metrics
  # port, never the public API port (ADR-0032).
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# Opt-in Ingress + TLS for the Web Instance (#121, ADR-0039). OFF by default: a
# bare install keeps the web Service ClusterIP-only. Enabling it needs ONLY a
# host — the Ingress then routes that host to the web Service's public `http`
# port (the Connect API + console). TLS terminates AT the ingress (the app
# behind it stays plaintext, ADR-0039): supply your own TLS Secret by name, or
# opt into cert-manager to provision one. When enabled AND `web.oauth.redirectUrl`
# is left empty, the Discord OAuth redirect URL the Web Instance advertises is
# DERIVED from `host` (+ the fixed /auth/discord/callback path) so the callback
# can never drift from the Ingress host. An explicit `web.oauth.redirectUrl`
# still wins outright — set it when an external LB terminates TLS in front of a
# plain-HTTP Ingress.
ingress:
  # Off by default — Ingress is a separate exposure decision from the Service.
  enabled: false

  # The single external host the Ingress routes to the web Service. REQUIRED when
  # ingress.enabled (the render fails fast otherwise): enabling the Ingress needs
  # only this. It also drives the derived Discord OAuth redirect URL.
  host: ""

  # The IngressClass that serves this Ingress (which controller: nginx, traefik,
  # …). Empty leaves it unset so the cluster's default IngressClass is used.
  className: ""

  # TLS termination at the ingress (ADR-0039). Set `secretName` to reference an
  # EXTERNALLY supplied TLS Secret (a kubernetes.io/tls Secret you created). Leave
  # it empty and enable cert-manager below to have the certificate provisioned
  # into a release-derived Secret instead. With neither set, the Ingress serves
  # plain HTTP (e.g. TLS terminated by an upstream load balancer).
  tls:
    secretName: ""

  # Opt-in cert-manager path. When enabled, a `cert-manager.io/cluster-issuer`
  # annotation is added and cert-manager provisions the TLS Secret (the name from
  # `tls.secretName`, or a release-derived default). `clusterIssuer` is REQUIRED
  # when enabled. Leave disabled to use an externally supplied `tls.secretName`.
  certManager:
    enabled: false
    clusterIssuer: ""

# Pod-level knobs shared by the workloads this chart renders.
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
