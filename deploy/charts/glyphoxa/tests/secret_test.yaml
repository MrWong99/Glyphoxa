suite: DB connection Secret
# A single Secret holds the Postgres credentials and the assembled
# GLYPHOXA_DATABASE_URL. Both Postgres (its POSTGRES_PASSWORD) and the migrate
# Job (its GLYPHOXA_DATABASE_URL) read from it, so the URL and the password can
# never drift apart. The template writes stringData (kubelet encodes it), which
# also keeps the rendered value assertable here.
templates:
  - templates/secret.yaml
# appSecret has no default (an unset value fails the render so a deploy can never
# silently run on a weak key); supply a placeholder for every render here. The
# shared credential keys (DISCORD_BOT_TOKEN + the three provider keys) render
# when EITHER voice.enabled or web.enabled — both on by default. Of those only
# the bot token is required; the provider keys are the BYOK env fallback
# (ADR-0004) and may stay empty. The web keys (the three Discord OAuth
# credentials + the operator allowlist) are required when web.enabled, so supply
# placeholders for them too. Every fixture is
# deliberately plain low-entropy ASCII, NOT a base64 32-byte key or a real token —
# the template stores them verbatim in stringData, and a random blob here only
# trips secret scanners. Production still requires real values (see values.yaml).
set:
  appSecret: unit-test-placeholder-not-a-real-secret
  discordBotToken: unit-test-discord-token-placeholder
  elevenLabsApiKey: unit-test-elevenlabs-placeholder
  geminiApiKey: unit-test-gemini-placeholder
  groqApiKey: unit-test-groq-placeholder
  web:
    oauth:
      clientId: unit-test-oauth-client-id
      clientSecret: unit-test-oauth-client-secret
      redirectUrl: http://localhost:8080/auth/discord/callback
    operatorIds: "111111111111111111"
tests:
  - it: renders an Opaque Secret named for the release
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-glyphoxa-db
      - equal:
          path: type
          value: Opaque

  - it: comes up as a hook ahead of the migrate Job
    # weight -10 < the migrate Job's -5, so the Secret exists before the migrate
    # hook reads database-url from it.
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"

  - it: carries the database-url key keyed as the migrate Job references it
    asserts:
      - isNotNullOrEmpty:
          path: stringData["database-url"]
      - isNotNullOrEmpty:
          path: stringData.password

  - it: assembles the url against the in-cluster Postgres Service DNS
    # The migrate Job's GLYPHOXA_DATABASE_URL comes from this key; it MUST target
    # the Postgres Service name (not localhost) so the hook Pod reaches the DB.
    asserts:
      - matchRegex:
          path: stringData["database-url"]
          pattern: ^postgres://glyphoxa:.+@RELEASE-NAME-glyphoxa-postgres:5432/glyphoxa

  - it: lets the operator supply an external database url verbatim
    set:
      database:
        url: postgres://u:p@external.example.com:5432/glyphoxa?sslmode=require
    asserts:
      - equal:
          path: stringData["database-url"]
          value: postgres://u:p@external.example.com:5432/glyphoxa?sslmode=require

  - it: carries the app-secret key the seed Job reads as GLYPHOXA_SECRET
    # The credential-cipher key (ADR-0004) the seed uses to seal placeholder
    # provider credentials. It rides in the same Secret as the DB URL so the
    # demo app's two secrets stay in one place.
    set:
      appSecret: unit-test-placeholder-not-a-real-secret
    asserts:
      - equal:
          path: stringData["app-secret"]
          value: unit-test-placeholder-not-a-real-secret

  - it: carries the shared credential keys when voice is enabled
    # The DISCORD_BOT_TOKEN + the three provider keys are shared by the voice
    # Deployment (#36) and the web Deployment (#118); they are emitted when
    # EITHER is enabled — the bot token required, the provider keys optional
    # (BYOK env fallback, tested below).
    asserts:
      - isNotNullOrEmpty:
          path: stringData["discord-bot-token"]
      - isNotNullOrEmpty:
          path: stringData["elevenlabs-api-key"]
      - isNotNullOrEmpty:
          path: stringData["gemini-api-key"]
      - isNotNullOrEmpty:
          path: stringData["groq-api-key"]

  - it: carries the shared credential keys when only web is enabled
    # Web reads the same bot token + provider keys (BYOK env fallback), so
    # disabling voice does not drop them while web is on.
    set:
      voice:
        enabled: false
    asserts:
      - isNotNullOrEmpty:
          path: stringData["discord-bot-token"]
      - isNotNullOrEmpty:
          path: stringData["groq-api-key"]

  - it: renders empty provider keys for a BYOK web-only install
    # The three provider keys are only the env FALLBACK of the hybrid BYOK
    # policy (ADR-0004/ADR-0039): a BYOK deployment leaves them empty and
    # Tenants bring their own keys via Provider Configs, so an empty value must
    # render, not fail — this is the exact values posture documented in
    # docs/deploy/k3s-proxmox.md §5. The keys still exist (empty) because the
    # voice/web Deployments reference them by secretKeyRef unconditionally;
    # omitting them would dead-end the pod at CreateContainerConfigError. Only
    # a managed/platform-key deployment (ADR-0054) fills them.
    set:
      voice:
        enabled: false
      elevenLabsApiKey: ""
      geminiApiKey: ""
      groqApiKey: ""
    asserts:
      - equal:
          path: stringData["elevenlabs-api-key"]
          value: ""
      - equal:
          path: stringData["gemini-api-key"]
          value: ""
      - equal:
          path: stringData["groq-api-key"]
          value: ""
      # The bot token is NOT part of the BYOK relaxation — the web tier still
      # joins the gateway with it.
      - isNotNullOrEmpty:
          path: stringData["discord-bot-token"]

  - it: still requires the bot token when the provider keys are relaxed
    # Pins the boundary of the BYOK relaxation: the provider keys may be empty,
    # the Discord bot token may not — no gateway login, no deployment.
    set:
      discordBotToken: ""
      elevenLabsApiKey: ""
      geminiApiKey: ""
      groqApiKey: ""
    asserts:
      - failedTemplate:
          errorPattern: "discordBotToken is required"

  - it: carries the web keys — the three OAuth credentials + the operator allowlist — when web is enabled
    # The web Deployment (#118) reads the Discord OAuth trio + GLYPHOXA_OPERATOR_IDS
    # from this Secret; they are only emitted when web.enabled (on by default) and
    # each is required then (a Web Instance refuses to boot without a login,
    # ADR-0041). Asserted by exact value (not isNotNullOrEmpty, which passes on a
    # missing path) so an absent key is a real failure.
    asserts:
      - equal:
          path: stringData["discord-oauth-client-id"]
          value: unit-test-oauth-client-id
      - equal:
          path: stringData["discord-oauth-client-secret"]
          value: unit-test-oauth-client-secret
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: http://localhost:8080/auth/discord/callback
      - equal:
          path: stringData["operator-ids"]
          value: "111111111111111111"

  - it: derives the OAuth redirect URL from the Ingress host over https via cert-manager
    # With the Ingress enabled and NO explicit web.oauth.redirectUrl, the advertised
    # DISCORD_OAUTH_REDIRECT_URL is derived from ingress.host + the fixed callback
    # path, so the Discord callback can never drift from the host the Ingress
    # terminates (#121). cert-manager provisions TLS at the ingress → https.
    set:
      web:
        oauth:
          redirectUrl: ""
      ingress:
        enabled: true
        host: glyphoxa.example.com
        certManager:
          enabled: true
          clusterIssuer: letsencrypt-prod
    asserts:
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: https://glyphoxa.example.com/auth/discord/callback

  - it: derives the OAuth redirect URL over https for an external-TLS-secret Ingress
    # The most common production path: cert-manager OFF, operator-supplied TLS
    # Secret. A regression dropping tls.secretName from the scheme test would ship
    # http:// here and dead-end logins, so pin it explicitly.
    set:
      web:
        oauth:
          redirectUrl: ""
      ingress:
        enabled: true
        host: glyphoxa.example.com
        tls:
          secretName: glyphoxa-web-tls
    asserts:
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: https://glyphoxa.example.com/auth/discord/callback

  - it: derives the OAuth redirect URL over http for a TLS-less Ingress
    # A host-only Ingress whose OWN TLS is off (no Secret, no cert-manager) derives
    # http. An operator whose external LB terminates TLS in front of it sets an
    # explicit https web.oauth.redirectUrl (next case), which wins.
    set:
      web:
        oauth:
          redirectUrl: ""
      ingress:
        enabled: true
        host: glyphoxa.example.com
    asserts:
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: http://glyphoxa.example.com/auth/discord/callback

  - it: lets an explicit redirect URL win even with the Ingress enabled
    # An operator override is authoritative regardless of ingress.enabled — the
    # external-LB-terminates-TLS-in-front-of-a-plain-HTTP-Ingress case: the app's
    # own Ingress is http but the browser hits https, so the operator sets the
    # https callback explicitly and the chart must not clobber it with its
    # derived http:// value.
    set:
      web:
        oauth:
          redirectUrl: https://public.example.com/auth/discord/callback
      ingress:
        enabled: true
        host: internal.example.com
    asserts:
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: https://public.example.com/auth/discord/callback

  - it: uses the explicit redirect URL verbatim when the Ingress is disabled
    # Self-host behind an external reverse proxy: no Ingress, so the operator's
    # web.oauth.redirectUrl is authoritative (and required, tested by the default
    # fixture above).
    asserts:
      - equal:
          path: stringData["discord-oauth-redirect-url"]
          value: http://localhost:8080/auth/discord/callback

  - it: omits the web keys when web is disabled
    # A voice-only install needs no OAuth/allowlist, so those keys are left out
    # of the Secret entirely (and not required).
    set:
      web:
        enabled: false
    asserts:
      - notExists:
          path: stringData["discord-oauth-client-id"]
      - notExists:
          path: stringData["operator-ids"]

  - it: keeps the shared credential keys for a voice-only install (web disabled)
    # The voice-only branch of the `or voice web` gate: with web off but voice on,
    # the bot token + the three provider keys must STILL render. Asserted with
    # `exists` (not isNotNullOrEmpty, which passes on a missing path) so a mutant
    # dropping voice from the OR — which would break every real voice-only
    # install — is a real failure here.
    set:
      web:
        enabled: false
    asserts:
      - exists:
          path: stringData["discord-bot-token"]
      - exists:
          path: stringData["elevenlabs-api-key"]
      - exists:
          path: stringData["gemini-api-key"]
      - exists:
          path: stringData["groq-api-key"]

  - it: omits every runtime credential key for a migrate/seed-only install
    # With BOTH voice.enabled=false and web.enabled=false the DB-only install
    # needs no Discord/provider/OAuth keys, so they are all left out of the Secret
    # (and not required).
    set:
      voice:
        enabled: false
      web:
        enabled: false
    asserts:
      - notExists:
          path: stringData["discord-bot-token"]
      - notExists:
          path: stringData["groq-api-key"]
      - notExists:
          path: stringData["discord-oauth-client-id"]
      - notExists:
          path: stringData["operator-ids"]
      # The DB + cipher keys still render — they are not gated on voice or web.
      - isNotNullOrEmpty:
          path: stringData["database-url"]
      - isNotNullOrEmpty:
          path: stringData["app-secret"]
