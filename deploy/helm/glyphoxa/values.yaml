# Default values for Glyphoxa Helm chart.

# -- Deployment topology: "shared" or "dedicated"
topology: shared

image:
  repository: ghcr.io/mrwong99/glyphoxa
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- Gateway configuration (--mode=gateway)
gateway:
  replicaCount: 3

  # Admin API key (env var GLYPHOXA_ADMIN_KEY).
  # Set via sealed secret in production; this is a dev default.
  adminKey: ""

  ports:
    admin: 8081
    grpc: 50051
    observe: 9090

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  nodeSelector: {}
  tolerations: []

  # Pod anti-affinity across nodes for HA.
  podAntiAffinity:
    enabled: true

  serviceAccount:
    # -- Create a ServiceAccount with Job management RBAC.
    create: true
    name: glyphoxa-gateway
    annotations: {}

# -- Worker configuration (--mode=worker)
# Workers are created as Kubernetes Jobs by the gateway at session start.
worker:
  # Resource profile: "cloud", "whisper-native", or "local-llm".
  resourceProfile: cloud

  # Per-profile resource limits.
  profiles:
    cloud:
      requests:
        cpu: 500m
        memory: 384Mi
      limits:
        cpu: "2"
        memory: 768Mi
    whisper-native:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 2Gi
    local-llm:
      requests:
        cpu: "4"
        memory: 4Gi
      limits:
        cpu: "8"
        memory: 8Gi

  # Safety deadline for worker Jobs (seconds). Kills zombie sessions.
  activeDeadlineSeconds: 14400  # 4 hours

  # Seconds to keep completed Job pods before cleanup.
  ttlSecondsAfterFinished: 300

  ports:
    grpc: 50051
    observe: 9090

  nodeSelector: {}
  tolerations: []

  # GPU node scheduling for local-llm profile.
  # When resourceProfile is "local-llm", these are merged with worker
  # nodeSelector/tolerations to schedule on GPU-equipped nodes.
  gpu:
    nodeSelector:
      nvidia.com/gpu: "true"
    tolerations:
      - key: nvidia.com/gpu
        effect: NoSchedule

# -- MCP Gateway configuration (--mode=mcp-gateway)
# Shared MCP tool server for all workers. Hosts stateless tools (dice, rules)
# and proxies external MCP servers.
mcpGateway:
  enabled: true
  replicaCount: 2

  ports:
    mcp: 8080
    observe: 9090

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  nodeSelector: {}
  tolerations: []

# -- ConfigMap for Glyphoxa YAML configuration.
# Mounted at /etc/glyphoxa/config.yaml inside both gateway and worker pods.
config:
  # Inline YAML config. Override per-environment in values-shared.yaml
  # or values-dedicated.yaml.
  data: {}

# -- Vault integration (optional).
# When enabled, bot tokens are encrypted at rest via Transit and gRPC certs
# can be issued via PKI. Gracefully degrades if Vault is unreachable.
vault:
  enabled: false
  addr: ""  # e.g. "https://vault.openclaw.lan"
  # Token is stored in the Secret resource (see secrets.vaultToken below).

# -- Sensitive values stored in Kubernetes Secrets.
# These are injected as env vars via secretKeyRef. Set them here for dev/test,
# or use SealedSecrets / external-secrets in production.
secrets:
  vaultToken: ""
  databaseDSN: ""        # overrides database.dsn when set
  elevenlabsApiKey: ""
  geminiApiKey: ""
  deepgramApiKey: ""
  openaiApiKey: ""

# -- Database connection.
database:
  # DSN for the gateway/worker PostgreSQL connection.
  # When postgresql.enabled=true, this is auto-generated from subchart values.
  dsn: ""

# -- Network policies
networkPolicy:
  enabled: true

# -- Horizontal Pod Autoscaler for the gateway.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# -- Optional PostgreSQL subchart (Bitnami).
postgresql:
  enabled: false
  auth:
    postgresPassword: ""
    database: glyphoxa
  primary:
    persistence:
      size: 10Gi

# -- Optional Sealed Secrets controller subchart.
sealed-secrets:
  enabled: false
