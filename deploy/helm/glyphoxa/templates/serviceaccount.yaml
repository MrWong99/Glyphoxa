{{- if .Values.gateway.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "glyphoxa.gateway.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glyphoxa.labels" . | nindent 4 }}
    {{- include "glyphoxa.gateway.selectorLabels" . | nindent 4 }}
  {{- with .Values.gateway.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "glyphoxa.fullname" . }}-job-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glyphoxa.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "glyphoxa.fullname" . }}-job-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glyphoxa.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "glyphoxa.gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "glyphoxa.fullname" . }}-job-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
