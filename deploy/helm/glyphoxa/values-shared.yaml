# Values overlay for shared topology.
# Usage: helm install glyphoxa ./deploy/helm/glyphoxa -f deploy/helm/glyphoxa/values-shared.yaml

topology: shared

gateway:
  replicaCount: 3
  podAntiAffinity:
    enabled: true
  nodeSelector:
    glyphoxa.io/tier: shared
  tolerations:
    - key: glyphoxa.io/tier
      value: shared
      effect: NoSchedule

worker:
  resourceProfile: cloud
  nodeSelector:
    glyphoxa.io/tier: shared
  tolerations:
    - key: glyphoxa.io/tier
      value: shared
      effect: NoSchedule

networkPolicy:
  enabled: true

autoscaling:
  enabled: false
