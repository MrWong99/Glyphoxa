version: 2

git:
  ignore_tags:
    - "zhi-*"

builds:
  - id: glyphoxa
    main: ./cmd/glyphoxa
    binary: glyphoxa
    # The outbound Opus encoder is libopus again (hraban/opus via CGO —
    # ADR-0034 amendment 2026-07-19), so this mirrors the Dockerfile: CGO on,
    # `nolibopusfile` paired with `opus`, `netgo osusergo` for the pure-Go
    # net/user resolvers, and a fully static link (-extldflags "-static -lm").
    # The release host needs pkg-config + libopus-dev (libopus.a) installed.
    #
    # linux/arm64 is dropped for now: static CGO needs a per-arch C toolchain
    # + arm64 libopus.a, which the release environment does not provide. How
    # (or whether) to cross-compile the arm64 archive is an open decision —
    # see the ADR-0034 2026-07-19 amendment. The container image remains the
    # canonical artifact.
    flags:
      - -tags=opus,dave,nolibopusfile,netgo,osusergo
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -extldflags "-static -lm"

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MrWong99
    name: glyphoxa
  draft: false
  prerelease: auto
  name_template: "{{ .Version }}"
  header: |
    # Release {{ .Version }}
  footer: |
    # Glyphoxa Docker image
    docker pull ghcr.io/mrwong99/glyphoxa:v{{ .Version }}

    Release Date: {{ .Date }}
