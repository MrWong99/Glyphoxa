version: 2

git:
  ignore_tags:
    - "zhi-*"

builds:
  - id: glyphoxa
    main: ./cmd/glyphoxa
    binary: glyphoxa
    # The whole stack is pure Go: opus + dave since the pion/opus + dave-go
    # migration (#467), the Silero VAD since the bespoke pure-Go forward pass
    # (#468). CGO_ENABLED=0 gives fully static binaries and native
    # cross-compilation — no per-arch C toolchains.
    flags:
      - -tags=opus,dave
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MrWong99
    name: glyphoxa
  draft: false
  prerelease: auto
  name_template: "{{ .Version }}"
  header: |
    # Release {{ .Version }}
  footer: |
    # Glyphoxa Docker image
    docker pull ghcr.io/mrwong99/glyphoxa:v{{ .Version }}

    Release Date: {{ .Date }}
