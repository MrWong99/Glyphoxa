syntax = "proto3";

package glyphoxa.v1;

option go_package = "github.com/MrWong99/glyphoxa/gen/glyphoxa/v1;glyphoxav1";

import "google/protobuf/timestamp.proto";

// SessionState represents the lifecycle state of a session.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_PENDING = 1;
  SESSION_STATE_ACTIVE = 2;
  SESSION_STATE_ENDED = 3;
}

// NPCConfig defines the configuration for an NPC within a session.
message NPCConfig {
  string name = 1;
  string personality = 2;
  string engine = 3;
  string voice_id = 4;
  repeated string knowledge_scope = 5;
  string budget_tier = 6;
  bool gm_helper = 7;
  bool address_only = 8;
}

// StartSessionRequest is sent by the gateway to a worker to start a new voice session.
message StartSessionRequest {
  string tenant_id = 1;
  string campaign_id = 2;
  string guild_id = 3;
  string channel_id = 4;
  string license_tier = 5;
  string session_id = 6;
  repeated NPCConfig npc_configs = 7;
  string bot_token = 8;

  // Fields 9-12 were voice proxy credentials, removed in favour of
  // AudioBridgeService which streams opus frames over gRPC.
  reserved 9, 10, 11, 12;
  reserved "voice_session_id", "voice_token", "voice_endpoint";

  // bot_user_id is the bot's Discord user ID (snowflake). Workers use it to
  // activate the self-hearing guard — filtering out the bot's own audio frames
  // so NPCs don't hear their own TTS output (echo/feedback loop prevention).
  string bot_user_id = 13;
}

// StartSessionResponse is the worker's reply after attempting to start a session.
message StartSessionResponse {
  string session_id = 1;
  string error = 2;
}

// StopSessionRequest asks a worker to stop a running session.
message StopSessionRequest {
  string session_id = 1;
}

// StopSessionResponse is the worker's reply after stopping a session.
message StopSessionResponse {
  string error = 1;
}

// GetStatusRequest queries the status of one or all sessions on a worker.
// If session_id is empty, the worker returns the status of all sessions.
message GetStatusRequest {
  string session_id = 1;
}

// SessionStatus describes the current state of a single session.
message SessionStatus {
  string session_id = 1;
  SessionState state = 2;
  google.protobuf.Timestamp started_at = 3;
  string error = 4;
}

// GetStatusResponse returns the status of one or more sessions.
message GetStatusResponse {
  repeated SessionStatus sessions = 1;
}

// ReportStateRequest is sent by a worker back to the gateway to report a state change.
message ReportStateRequest {
  string session_id = 1;
  SessionState state = 2;
  string error = 3;
}

// ReportStateResponse is the gateway's acknowledgement of a state report.
message ReportStateResponse {}

// HeartbeatRequest is sent periodically by a worker to the gateway.
message HeartbeatRequest {
  string session_id = 1;
  string worker_pod = 2;
}

// HeartbeatResponse is the gateway's acknowledgement of a heartbeat.
message HeartbeatResponse {}

// NPCInfo describes an NPC within a running session.
message NPCInfo {
  string id = 1;
  string name = 2;
  bool muted = 3;
}

// ListNPCsRequest asks a worker for the NPCs in a session.
message ListNPCsRequest {
  string session_id = 1;
}

// ListNPCsResponse returns the NPCs in a session.
message ListNPCsResponse {
  repeated NPCInfo npcs = 1;
}

// MuteNPCRequest asks a worker to mute a specific NPC.
message MuteNPCRequest {
  string session_id = 1;
  string npc_name = 2;
}

// MuteNPCResponse is the worker's reply after muting an NPC.
message MuteNPCResponse {}

// UnmuteNPCRequest asks a worker to unmute a specific NPC.
message UnmuteNPCRequest {
  string session_id = 1;
  string npc_name = 2;
}

// UnmuteNPCResponse is the worker's reply after unmuting an NPC.
message UnmuteNPCResponse {}

// MuteAllNPCsRequest asks a worker to mute all NPCs in a session.
message MuteAllNPCsRequest {
  string session_id = 1;
}

// MuteAllNPCsResponse returns how many NPCs were muted.
message MuteAllNPCsResponse {
  int32 count = 1;
}

// UnmuteAllNPCsRequest asks a worker to unmute all NPCs in a session.
message UnmuteAllNPCsRequest {
  string session_id = 1;
}

// UnmuteAllNPCsResponse returns how many NPCs were unmuted.
message UnmuteAllNPCsResponse {
  int32 count = 1;
}

// SpeakNPCRequest asks a worker to make an NPC speak pre-written text.
message SpeakNPCRequest {
  string session_id = 1;
  string npc_name = 2;
  string text = 3;
}

// SpeakNPCResponse is the worker's reply after triggering NPC speech.
message SpeakNPCResponse {}

// AudioFrame carries a single opus-encoded audio packet between the gateway
// and a worker over a bidirectional gRPC stream.
message AudioFrame {
  // session_id identifies the session this frame belongs to.
  string session_id = 1;

  // opus_data is the raw Opus-encoded audio packet.
  bytes opus_data = 2;

  // ssrc identifies the speaker (incoming only, from Discord).
  uint32 ssrc = 3;

  // user_id is the Discord user ID of the speaker (incoming only).
  string user_id = 4;

  // is_silence marks a silence frame (used to signal Discord to start
  // routing audio to the bot at connection startup).
  bool is_silence = 5;

  // flush signals the gateway to discard all buffered audio for this session.
  // Sent by the worker when barge-in or mute interrupts playback, so the
  // gateway does not continue playing stale pre-buffered frames.
  bool flush = 6;
}

// SessionWorkerService is the gRPC service exposed by workers, called by the gateway.
service SessionWorkerService {
  // StartSession tells the worker to begin a new voice session.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  // StopSession tells the worker to end a running session.
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  // GetStatus returns the status of one or all sessions on this worker.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  // ListNPCs returns the NPCs in a running session.
  rpc ListNPCs(ListNPCsRequest) returns (ListNPCsResponse);
  // MuteNPC mutes a specific NPC in a session.
  rpc MuteNPC(MuteNPCRequest) returns (MuteNPCResponse);
  // UnmuteNPC unmutes a specific NPC in a session.
  rpc UnmuteNPC(UnmuteNPCRequest) returns (UnmuteNPCResponse);
  // MuteAllNPCs mutes all NPCs in a session.
  rpc MuteAllNPCs(MuteAllNPCsRequest) returns (MuteAllNPCsResponse);
  // UnmuteAllNPCs unmutes all NPCs in a session.
  rpc UnmuteAllNPCs(UnmuteAllNPCsRequest) returns (UnmuteAllNPCsResponse);
  // SpeakNPC forces an NPC to speak pre-written text.
  rpc SpeakNPC(SpeakNPCRequest) returns (SpeakNPCResponse);
}

// AudioBridgeService streams opus audio frames between the gateway (which owns
// the Discord voice connection) and a worker (which runs the voice pipeline).
// The gateway joins voice normally via disgo's VoiceManager and bridges audio
// over this bidirectional stream.
service AudioBridgeService {
  // StreamAudio opens a bidirectional stream of opus audio frames.
  // Gateway → Worker: incoming Discord audio (one frame per speaking user).
  // Worker → Gateway: outgoing NPC audio to be sent to Discord.
  rpc StreamAudio(stream AudioFrame) returns (stream AudioFrame);
}

// SessionGatewayService is the gRPC service exposed by the gateway, called by workers.
service SessionGatewayService {
  // ReportState is called by a worker to report a session state change.
  rpc ReportState(ReportStateRequest) returns (ReportStateResponse);
  // Heartbeat is called periodically by a worker to signal liveness.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
