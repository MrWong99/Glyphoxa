// Package glyphoxa.management.v1 defines the operator-facing management API
// served over Connect (gRPC + Connect + gRPC-Web) by the web tier (ADR-0039).
// Stage 1 (#65) exposes a single read RPC; CRUD and session control land later.
syntax = "proto3";

package glyphoxa.management.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/MrWong99/Glyphoxa/gen/glyphoxa/management/v1;managementv1";

// CampaignService exposes read access to the operator's campaigns. For the
// single-operator self-host (ADR-0039) it resolves the sole seeded tenant; the
// X-Tenant-Id pass-through that scopes multi-tenant reads fills in later.
service CampaignService {
  // GetActiveCampaign returns the operator's resolved Active Campaign: the live
  // Voice Session's campaign when one is running, else the durable selection
  // written by SetActiveCampaign / `/glyphoxa use`, else the most-recently-created
  // campaign (#222). It fails with CodeNotFound when no campaign exists.
  rpc GetActiveCampaign(GetActiveCampaignRequest) returns (GetActiveCampaignResponse);

  // ListCampaigns returns the operator's campaigns in name order (#264). It backs
  // the web UI's campaign picker. It is a read (NO_SIDE_EFFECTS), so the CSRF
  // check is exempt.
  rpc ListCampaigns(ListCampaignsRequest) returns (ListCampaignsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // CreateCampaign creates a campaign and returns it (#264). name is required
  // (empty is CodeInvalidArgument); system/language are optional free-text. The
  // tenant is resolved server-side (ADR-0039), and the ADR-0009 auto-Butler
  // trigger fires so the new campaign has its Butler with the dice grant.
  // State-changing: the auth + CSRF interceptors guard it.
  rpc CreateCampaign(CreateCampaignRequest) returns (CreateCampaignResponse);

  // UpdateCampaign writes a campaign's name/system/language and returns the
  // updated campaign (#264). id is required; an unknown id is CodeNotFound and an
  // empty name is CodeInvalidArgument. system/language are stored as opaque
  // free-text strings (no validation) and take effect on the next Voice Session.
  // State-changing: the auth + CSRF interceptors guard it.
  rpc UpdateCampaign(UpdateCampaignRequest) returns (UpdateCampaignResponse);

  // ListSupportedLanguages returns the Campaign Language choices: the language
  // codes with a registered phonetic encoder (ADR-0024 EncoderRegistry), sorted.
  rpc ListSupportedLanguages(ListSupportedLanguagesRequest) returns (ListSupportedLanguagesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // SetActiveCampaign records the operator's durable Active Campaign selection —
  // the SAME users.active_campaign_id row `/glyphoxa use` writes, keeping both
  // surfaces in lockstep (#264, migration 00014) — and returns the resulting
  // resolved Active Campaign. campaign_id is validated first; an unknown id is
  // CodeNotFound. The live-first resolution rule is untouched: while a Voice
  // Session is live its campaign still wins, so the returned campaign may differ
  // from the one just selected. State-changing: the auth + CSRF interceptors
  // guard it.
  rpc SetActiveCampaign(SetActiveCampaignRequest) returns (SetActiveCampaignResponse);

  // GetCampaignRoster returns the active campaign together with its ordered
  // roster — the Butler first, then the Character NPCs — each carrying a stable
  // speaker-colour slot (#71). It is a read (NO_SIDE_EFFECTS), so the CSRF check
  // is exempt; it fails with CodeNotFound when no campaign exists.
  rpc GetCampaignRoster(GetCampaignRosterRequest) returns (GetCampaignRosterResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // CreateAgent adds a Character NPC ("Add NPC") to the active campaign and
  // returns the created agent, including its server-assigned speaker-colour slot.
  // The role is always 'character'; the Butler is auto-created (ADR-0009).
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);

  // UpdateAgent saves an agent's editor fields (name, title, persona, voice,
  // address-only, aliases) and returns the updated agent. Editing the Butler can
  // neither change its role nor turn off Address-Only (ADR-0009 / ADR-0024). A
  // missing id fails with CodeNotFound.
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse);

  // DeleteAgent removes a Character NPC. Deleting the Butler fails with
  // CodeFailedPrecondition (it is undeletable, ADR-0009); a missing id fails with
  // CodeNotFound.
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);

  // CreateNode adds a Knowledge Graph Node ("entry") to the active campaign and
  // returns the created Node (ADR-0008 v1.0). An UNSPECIFIED node_type or an empty
  // name fails with CodeInvalidArgument; the campaign is resolved server-side.
  rpc CreateNode(CreateNodeRequest) returns (CreateNodeResponse);

  // ListNodes returns the active campaign's Knowledge Graph Nodes in stable
  // display order (type, then case-insensitive name). It is a read
  // (NO_SIDE_EFFECTS), so the CSRF check is exempt.
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // UpdateNode saves a Knowledge Graph Node's editor fields (name/body/gm_private)
  // and returns the updated Node (#129). node_type is immutable, so it is not in
  // the request. An empty name is CodeInvalidArgument; an unknown id is CodeNotFound.
  rpc UpdateNode(UpdateNodeRequest) returns (UpdateNodeResponse);

  // DeleteNode removes a Knowledge Graph Node by id (#129). An unknown id is
  // CodeNotFound.
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);

  // CreateEdge adds a typed directional Edge between two same-campaign Nodes
  // (#132, ADR-0008 v1.0 + amendment). An invalid (type, from-type, to-type)
  // combination or a self-edge is CodeInvalidArgument; a duplicate (from, to,
  // type) is CodeAlreadyExists; a missing OR cross-campaign endpoint is
  // CodeNotFound (a cross-campaign Edge is impossible).
  rpc CreateEdge(CreateEdgeRequest) returns (CreateEdgeResponse);

  // DeleteEdge removes a typed Edge by id (#132). An unknown id is CodeNotFound.
  rpc DeleteEdge(DeleteEdgeRequest) returns (DeleteEdgeResponse);

  // ListNodeEdges returns a Node's incident Edges split into outgoing and
  // incoming lists (strictly directional; no auto-inverse, ADR-0008 amendment),
  // each carrying its endpoints' joined name/type. It is a read (NO_SIDE_EFFECTS).
  rpc ListNodeEdges(ListNodeEdgesRequest) returns (ListNodeEdgesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // SetNodeAgent links or unlinks an NPC Node's "voiced by" Character NPC Agent
  // (#132, ADR-0008 amendment). An empty agent_id unlinks. Linking a non-NPC Node
  // is CodeInvalidArgument; an Agent already voicing another Node is
  // CodeAlreadyExists; a missing OR cross-campaign Node/Agent is CodeNotFound.
  rpc SetNodeAgent(SetNodeAgentRequest) returns (SetNodeAgentResponse);

  // SearchNodes returns the active campaign's Knowledge Graph Nodes whose name or
  // body match the query, ranked by relevance (tsvector fts, ADR-0008 v1.0). It
  // backs the Campaign screen's live wiki search; gm_private Nodes ARE included
  // (GM-facing — the NPC-prompt exclusion is unchanged). An empty/whitespace query
  // is CodeInvalidArgument. It is a read (NO_SIDE_EFFECTS), so the CSRF check is
  // exempt.
  rpc SearchNodes(SearchNodesRequest) returns (SearchNodesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // ListToolGrants returns, for one Agent, EVERY built-in Tool (the ADR-0028
  // Registry is the available-Tools source) paired with the Agent's current grant
  // state — granted or not, its per-grant scope config, and whether the Tool
  // supports a scope. It backs the Campaign screen's per-Agent grant toggles
  // (#117). An unparsable agent_id is CodeInvalidArgument. It is a read
  // (NO_SIDE_EFFECTS), so the CSRF check is exempt.
  rpc ListToolGrants(ListToolGrantsRequest) returns (ListToolGrantsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // UpdateToolGrant toggles an Agent's grant of one Tool on or off and edits its
  // per-grant scope config (ADR-0029). granted=true upserts the row (with the
  // supplied config); granted=false removes it (idempotent — revoking an
  // already-ungranted Tool succeeds). The change takes effect in the Agent's NEXT
  // Voice Session via the hydration path (#113), not any running one. An
  // unparsable agent_id or an unknown/invalid config is CodeInvalidArgument; an
  // unregistered tool_name is CodeInvalidArgument. State-changing: the auth + CSRF
  // interceptors guard it exactly like the other CampaignService mutations.
  rpc UpdateToolGrant(UpdateToolGrantRequest) returns (UpdateToolGrantResponse);

  // ArchiveCampaign archives a campaign (#269): it is excluded from
  // ListCampaigns, the /glyphoxa use autocomplete, and the Active-Campaign
  // fallback, and can no longer start a Voice Session. Archive is idempotent. The
  // campaign backing the LIVE Voice Session cannot be archived
  // (CodeFailedPrecondition); an unknown id is CodeNotFound. State-changing: the
  // auth + CSRF interceptors guard it.
  rpc ArchiveCampaign(ArchiveCampaignRequest) returns (ArchiveCampaignResponse);

  // UnarchiveCampaign clears a campaign's archived state, returning it to the
  // active set (#269). An unknown id is CodeNotFound. State-changing: the auth +
  // CSRF interceptors guard it.
  rpc UnarchiveCampaign(UnarchiveCampaignRequest) returns (UnarchiveCampaignResponse);

  // DeleteCampaign permanently removes an ALREADY-ARCHIVED campaign and cascades
  // to its Agents, Knowledge Graph, transcripts, and Voice Sessions (#269). A
  // non-archived campaign is refused with CodeFailedPrecondition (archive first);
  // the campaign backing the LIVE Voice Session cannot be deleted
  // (CodeFailedPrecondition); an unknown id is CodeNotFound. Irreversible — the
  // web UI gates it behind a re-typed campaign name. State-changing: the auth +
  // CSRF interceptors guard it.
  rpc DeleteCampaign(DeleteCampaignRequest) returns (DeleteCampaignResponse);

  // ListCharacters returns the active campaign's Player Characters (PCs) in
  // stable display order (#276, E4). It is a read (NO_SIDE_EFFECTS), so the CSRF
  // check is exempt; no campaign is CodeNotFound.
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // CreateCharacter adds a Player Character to the active campaign and returns it
  // (#276). name is required and discord_user_id must be a Discord snowflake
  // (decimal digits only) — either invalid is CodeInvalidArgument; a Discord User
  // already playing a Character in the campaign is CodeAlreadyExists (one
  // Character per Discord User per Campaign). State-changing: the auth + CSRF
  // interceptors guard it.
  rpc CreateCharacter(CreateCharacterRequest) returns (CreateCharacterResponse);

  // UpdateCharacter saves a Character's editor fields (name, aliases,
  // discord_user_id) and returns the updated Character (#276). Rebinding
  // discord_user_id to a different Discord User is a normal update (it stays
  // required); an empty name or a non-snowflake discord_user_id is
  // CodeInvalidArgument; an unknown id is CodeNotFound; a collision with another
  // Character's Discord User is CodeAlreadyExists. State-changing: the auth + CSRF
  // interceptors guard it.
  rpc UpdateCharacter(UpdateCharacterRequest) returns (UpdateCharacterResponse);

  // DeleteCharacter removes a Player Character by id (#276). An unknown id is
  // CodeNotFound. State-changing: the auth + CSRF interceptors guard it.
  rpc DeleteCharacter(DeleteCharacterRequest) returns (DeleteCharacterResponse);

  // ListDiscordVoiceMembers lists the Discord Users currently in the operator's
  // configured voice channel — the Players panel's member picker (#279). Read
  // from the voice-state cache the Bot already receives (GuildVoiceStates
  // intent, no privileged intent); each member's name comes from a REST
  // GetMember. A nil presence / offline Bot / unresolved channel returns an
  // empty list (never an error), so the UI falls back to free-text snowflake
  // entry.
  rpc ListDiscordVoiceMembers(ListDiscordVoiceMembersRequest) returns (ListDiscordVoiceMembersResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// ToolGrant is one built-in Tool's availability and grant state for a single
// Agent (#117, ADR-0028/0029): the Tool's identity and description, whether the
// Agent is granted it, the per-grant scope config, and whether the Tool accepts a
// scope. The LLM is only ever shown granted Tools (least-privilege); this is the
// GM-facing editor view, so it lists ungranted Tools too.
message ToolGrant {
  // tool_name is the built-in Tool's stable [Tool.Name] (e.g. "dice").
  string tool_name = 1;
  // description is the Tool's natural-language summary (the editor's hint text).
  string description = 2;
  // granted is true when the Agent currently holds this Tool grant.
  bool granted = 3;
  // config is the per-grant scope blob as raw JSON (empty = no narrowing, dice's
  // shape). It round-trips verbatim through UpdateToolGrant; the Tool handler is
  // the only place it is interpreted, never the LLM (ADR-0029).
  string config = 4;
  // supports_scope is true when a per-grant config can narrow the Tool's authority
  // — the bit the editor keys its scope UI off. dice is false → no scope editor.
  bool supports_scope = 5;
}

// ListToolGrantsRequest names the Agent whose grant states to list.
message ListToolGrantsRequest {
  // agent_id is the Agent (Butler or Character NPC) to list grant state for.
  string agent_id = 1;
}

// ListToolGrantsResponse carries one entry per built-in Tool, in Tool-name order,
// each with the Agent's current grant state.
message ListToolGrantsResponse {
  // grants is every built-in Tool paired with this Agent's grant state.
  repeated ToolGrant grants = 1;
}

// UpdateToolGrantRequest toggles one Agent's grant of one Tool (and its scope).
message UpdateToolGrantRequest {
  // agent_id is the Agent whose grant to change.
  string agent_id = 1;
  // tool_name is the built-in Tool to grant or revoke; must be registered.
  string tool_name = 2;
  // granted turns the grant on (upsert) or off (remove).
  bool granted = 3;
  // config is the per-grant scope blob as raw JSON, applied when granted=true and
  // ignored when granted=false. Empty = no narrowing. Non-empty must be valid JSON.
  string config = 4;
}

// UpdateToolGrantResponse carries the resulting grant state for the toggled Tool,
// read back after the mutation so the client renders the persisted truth.
message UpdateToolGrantResponse {
  // grant is the toggled Tool's grant state after the change.
  ToolGrant grant = 1;
}

// EdgeType is a Knowledge Graph Edge's type (CONTEXT.md "Edge", ADR-0008 v1.0).
// Every Edge is a one-way assertion; a mutual relationship is two Edges.
enum EdgeType {
  // EDGE_TYPE_UNSPECIFIED is the zero value; the server rejects it on create.
  EDGE_TYPE_UNSPECIFIED = 0;
  EDGE_TYPE_RESIDES_IN = 1;
  EDGE_TYPE_MEMBER_OF = 2;
  EDGE_TYPE_OWNS = 3;
  EDGE_TYPE_KNOWS = 4;
  EDGE_TYPE_ENEMY_OF = 5;
  EDGE_TYPE_ALLY_OF = 6;
  EDGE_TYPE_PARENT_OF = 7;
  EDGE_TYPE_PARTICIPATED_IN = 8;
  EDGE_TYPE_MENTIONED_IN = 9;
}

// Edge is the wire representation of a typed directional Edge between two Nodes in
// one campaign (ADR-0008 v1.0). The endpoint names/types are joined server-side so
// the UI renders an incident-edge list without an N+1 per endpoint.
message Edge {
  // id is the edge's UUID.
  string id = 1;
  // from_node_id is the subject Node's UUID.
  string from_node_id = 2;
  // to_node_id is the object Node's UUID.
  string to_node_id = 3;
  // edge_type is the relationship type.
  EdgeType edge_type = 4;
  // from_node_name is the subject Node's display name (joined).
  string from_node_name = 5;
  // from_node_type is the subject Node's type (joined).
  NodeType from_node_type = 6;
  // to_node_name is the object Node's display name (joined).
  string to_node_name = 7;
  // to_node_type is the object Node's type (joined).
  NodeType to_node_type = 8;
  // created_at is when the edge was created.
  google.protobuf.Timestamp created_at = 9;
}

// CreateEdgeRequest is the "Add relation" payload. The campaign is resolved
// server-side; the endpoints must be same-campaign Nodes.
message CreateEdgeRequest {
  // from_node_id is the subject Node's UUID.
  string from_node_id = 1;
  // to_node_id is the object Node's UUID.
  string to_node_id = 2;
  // edge_type is the relationship type; UNSPECIFIED is rejected.
  EdgeType edge_type = 3;
}

// CreateEdgeResponse carries the created Edge (with joined endpoint fields).
message CreateEdgeResponse {
  // edge is the newly created Edge.
  Edge edge = 1;
}

// DeleteEdgeRequest names the Edge to delete; an unknown id is CodeNotFound.
message DeleteEdgeRequest {
  // id is the edge to delete.
  string id = 1;
}

// DeleteEdgeResponse is the (empty) response for DeleteEdge.
message DeleteEdgeResponse {}

// ListNodeEdgesRequest names the Node whose incident Edges to list.
message ListNodeEdgesRequest {
  // node_id is the Node whose edges to list.
  string node_id = 1;
}

// ListNodeEdgesResponse carries the Node's incident Edges split by direction —
// outgoing and incoming are separate lists because Edges are strictly one-way.
message ListNodeEdgesResponse {
  // outgoing are Edges whose subject (from) is this Node.
  repeated Edge outgoing = 1;
  // incoming are Edges whose object (to) is this Node.
  repeated Edge incoming = 2;
}

// SetNodeAgentRequest links (or unlinks) a Node's "voiced by" Agent.
message SetNodeAgentRequest {
  // node_id is the NPC Node to link.
  string node_id = 1;
  // agent_id is the Character NPC Agent to link; empty unlinks.
  string agent_id = 2;
}

// SetNodeAgentResponse carries the updated Node (with agent_id set or cleared).
message SetNodeAgentResponse {
  // node is the updated Node.
  Node node = 1;
}
// NodeType is a Knowledge Graph Node's type (CONTEXT.md "Node", ADR-0008 v1.0).
// The full 7-value set ships now; #126 only creates NOTE from the UI, but the
// wire type is complete so later slices (#129) need no proto change.
enum NodeType {
  // NODE_TYPE_UNSPECIFIED is the zero value; the server rejects it on create.
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_CHARACTER = 1;
  NODE_TYPE_NPC = 2;
  NODE_TYPE_LOCATION = 3;
  NODE_TYPE_FACTION = 4;
  NODE_TYPE_ITEM = 5;
  NODE_TYPE_PLOT_THREAD = 6;
  NODE_TYPE_NOTE = 7;
}

// Node is the wire representation of a Knowledge Graph Node — a typed wiki entry
// in one campaign (ADR-0008 v1.0). gm_private hides it from every NPC's Hot
// Context (#126).
message Node {
  // id is the node's UUID.
  string id = 1;
  // campaign_id is the owning campaign's UUID.
  string campaign_id = 2;
  // node_type is the node's type; immutable after create.
  NodeType node_type = 3;
  // name is the node's display name.
  string name = 4;
  // body is the node's prose (may be empty).
  string body = 5;
  // gm_private hides the node from every NPC's assembled prompt (#126).
  bool gm_private = 6;
  // created_at is when the node was created.
  google.protobuf.Timestamp created_at = 7;
  // updated_at is when the node was last modified.
  google.protobuf.Timestamp updated_at = 8;
  // agent_id is the optional NPC-Node ↔ Character NPC Agent link (#132): the
  // "voiced by" cast Agent's UUID, empty when unlinked or the Node is not an NPC.
  string agent_id = 9;
}

// CreateNodeRequest is the Knowledge panel's "Add entry" payload. The campaign is
// resolved server-side (single operator, ADR-0039).
message CreateNodeRequest {
  // node_type is the entry's type; UNSPECIFIED is rejected.
  NodeType node_type = 1;
  // name is the entry's display name; empty is rejected.
  string name = 2;
  // body is the entry's prose (optional).
  string body = 3;
  // gm_private keeps the entry out of every NPC's prompt (#126).
  bool gm_private = 4;
}

// CreateNodeResponse carries the created Node.
message CreateNodeResponse {
  // node is the newly created Knowledge Graph Node.
  Node node = 1;
}

// ListNodesRequest is the (empty) request; the active campaign is resolved
// server-side for the single operator.
message ListNodesRequest {}

// ListNodesResponse carries the campaign's Knowledge Graph Nodes in display order.
message ListNodesResponse {
  // nodes is the campaign's Knowledge Graph Nodes.
  repeated Node nodes = 1;
}

// UpdateNodeRequest carries a Node's editor fields. node_type is deliberately
// absent — a Node's type is immutable after create (ADR-0008). An empty name is
// rejected; an unknown id fails with CodeNotFound.
message UpdateNodeRequest {
  // id is the node to update.
  string id = 1;
  // name is the entry's display name; empty is rejected.
  string name = 2;
  // body is the entry's prose (optional).
  string body = 3;
  // gm_private keeps the entry out of every NPC's prompt (#126).
  bool gm_private = 4;
}

// UpdateNodeResponse carries the updated Node.
message UpdateNodeResponse {
  // node is the updated Knowledge Graph Node.
  Node node = 1;
}

// DeleteNodeRequest names the Node to delete; an unknown id is CodeNotFound.
message DeleteNodeRequest {
  // id is the node to delete.
  string id = 1;
}

// DeleteNodeResponse is the (empty) response for DeleteNode.
message DeleteNodeResponse {}

// SearchNodesRequest carries the GM's raw search query; the active campaign is
// resolved server-side (single operator, ADR-0039). An empty/whitespace query is
// rejected with CodeInvalidArgument.
message SearchNodesRequest {
  // query is the GM's raw keyword search over Node name + body.
  string query = 1;
}

// SearchNodesResponse carries the matching Nodes in relevance rank order.
message SearchNodesResponse {
  // nodes are the matching Knowledge Graph Nodes, ranked by relevance; gm_private
  // Nodes are included (GM-facing search).
  repeated Node nodes = 1;
}

// Campaign is the wire representation of a campaign record.
message Campaign {
  // id is the campaign's UUID.
  string id = 1;
  // tenant_id is the owning tenant's UUID.
  string tenant_id = 2;
  // name is the human-readable campaign title.
  string name = 3;
  // system is the tabletop ruleset (e.g. "D&D 5e").
  string system = 4;
  // language is the BCP-47 tag the campaign runs in (e.g. "en", "de").
  string language = 5;
  // created_at is when the campaign was created.
  google.protobuf.Timestamp created_at = 6;
  // updated_at is when the campaign was last modified.
  google.protobuf.Timestamp updated_at = 7;
  // archived_at is when the campaign was archived (#269); unset means active. An
  // archived campaign is excluded from the default list, the /glyphoxa use
  // autocomplete, and the Active-Campaign fallback, and cannot start a Voice
  // Session.
  google.protobuf.Timestamp archived_at = 8;
}

// GetActiveCampaignRequest is the (empty) request for GetActiveCampaign; the
// active campaign is resolved server-side for the single operator.
message GetActiveCampaignRequest {}

// GetActiveCampaignResponse carries the resolved active campaign.
message GetActiveCampaignResponse {
  // campaign is the operator's resolved Active Campaign (live Voice Session's
  // campaign → durable selection → most-recently-created fallback).
  Campaign campaign = 1;
}

// ListCampaignsRequest carries the archive filter; the operator's campaigns are
// resolved server-side (single operator, ADR-0039).
message ListCampaignsRequest {
  // include_archived returns archived campaigns alongside active ones when true
  // (the archive-management panel, #269). Default false = active campaigns only.
  bool include_archived = 1;
}

// ListCampaignsResponse carries the operator's campaigns in name order.
message ListCampaignsResponse {
  // campaigns are the operator's campaigns, name-ordered.
  repeated Campaign campaigns = 1;
}

// CreateCampaignRequest is the "New campaign" payload. The tenant is resolved
// server-side (single operator, ADR-0039).
message CreateCampaignRequest {
  // name is the campaign title; empty is rejected with CodeInvalidArgument.
  string name = 1;
  // system is the tabletop ruleset (e.g. "D&D 5e"); optional free-text.
  string system = 2;
  // language is the BCP-47 tag the campaign runs in (e.g. "en"); optional
  // free-text.
  string language = 3;
}

// CreateCampaignResponse carries the created campaign (its auto-Butler is created
// as a side effect, ADR-0009).
message CreateCampaignResponse {
  // campaign is the newly created campaign.
  Campaign campaign = 1;
}

// UpdateCampaignRequest carries a campaign's editable fields. system/language are
// stored opaquely (no validation) and take effect on the next Voice Session.
message UpdateCampaignRequest {
  // id is the campaign to update; an unknown id fails with CodeNotFound.
  string id = 1;
  // name is the campaign title; empty is rejected with CodeInvalidArgument.
  string name = 2;
  // system is the tabletop ruleset; optional free-text, stored opaquely.
  string system = 3;
  // language is the BCP-47 tag; optional free-text, stored opaquely.
  string language = 4;
}

// UpdateCampaignResponse carries the updated campaign.
message UpdateCampaignResponse {
  // campaign is the updated campaign.
  Campaign campaign = 1;
}

message ListSupportedLanguagesRequest {}

message ListSupportedLanguagesResponse {
  // languages are the registered encoder codes as lowercase primary subtags
  // (e.g. ["de","en"]), sorted.
  repeated string languages = 1;
}

// SetActiveCampaignRequest names the campaign to make the operator's durable
// Active Campaign selection (#264).
message SetActiveCampaignRequest {
  // campaign_id is the campaign to select; an unknown id fails with CodeNotFound.
  string campaign_id = 1;
}

// SetActiveCampaignResponse carries the resulting resolved Active Campaign. The
// live-first rule still applies, so while a Voice Session is live this is that
// session's campaign, not necessarily the one just selected.
message SetActiveCampaignResponse {
  // campaign is the resolved Active Campaign after the selection.
  Campaign campaign = 1;
}

// ArchiveCampaignRequest names the campaign to archive (#269).
message ArchiveCampaignRequest {
  // id is the campaign to archive; an unknown id fails with CodeNotFound.
  string id = 1;
}

// ArchiveCampaignResponse carries the archived campaign (archived_at set).
message ArchiveCampaignResponse {
  // campaign is the archived campaign.
  Campaign campaign = 1;
}

// UnarchiveCampaignRequest names the campaign to unarchive (#269).
message UnarchiveCampaignRequest {
  // id is the campaign to unarchive; an unknown id fails with CodeNotFound.
  string id = 1;
}

// UnarchiveCampaignResponse carries the reactivated campaign (archived_at unset).
message UnarchiveCampaignResponse {
  // campaign is the reactivated campaign.
  Campaign campaign = 1;
}

// DeleteCampaignRequest names the already-archived campaign to permanently
// delete (#269). It carries the id only: the delete is gated server-side by the
// archived precondition, and the re-typed name confirmation is a UI-only guard.
message DeleteCampaignRequest {
  // id is the campaign to delete; it must already be archived
  // (CodeFailedPrecondition otherwise) and an unknown id fails with CodeNotFound.
  string id = 1;
}

// DeleteCampaignResponse is empty: a successful delete removes the campaign and
// everything cascading from it.
message DeleteCampaignResponse {}

// AuthService exposes the operator's authenticated identity to the SPA boot
// flow (ADR-0016 / ADR-0039). The session itself is issued by the net/http
// Discord OAuth carve-out (ADR-0015); this Connect surface reads it back and
// tears it down. The auth interceptor resolves the session cookie into the
// request context, so GetCurrentUser fails with CodeUnauthenticated when no
// valid session is present — the SPA's 401 → /login signal.
service AuthService {
  // GetCurrentUser returns the signed-in operator's display identity. It is a
  // read (NO_SIDE_EFFECTS) and is reachable unauthenticated so the SPA can probe
  // the session at boot: no/expired session fails with CodeUnauthenticated.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Logout deletes the server-side session row and clears the session + CSRF
  // cookies. It is state-changing, so the auth + CSRF interceptors guard it.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// User is the signed-in operator's display identity (ADR-0016). It deliberately
// omits the internal user id and Discord user id — the SPA only renders the
// name, role, and avatar in the sidebar.
message User {
  // name is the operator's display name (Discord global name or username).
  string name = 1;
  // role is the operator's role label (e.g. "operator").
  string role = 2;
  // avatar is an absolute avatar image URL, or empty when none is set.
  string avatar = 3;
}

// GetCurrentUserRequest is the (empty) request for GetCurrentUser; the operator
// is resolved server-side from the session cookie.
message GetCurrentUserRequest {}

// GetCurrentUserResponse carries the signed-in operator's identity.
message GetCurrentUserResponse {
  // user is the signed-in operator.
  User user = 1;
}

// LogoutRequest is the (empty) request for Logout; the session to delete is
// resolved server-side from the session cookie.
message LogoutRequest {}

// LogoutResponse is the (empty) response for Logout.
message LogoutResponse {}

// Agent is the wire representation of a roster member — the Butler or a Character
// NPC (ADR-0009). It carries the editor-facing fields plus the server-assigned
// speaker-colour slot; the encrypted provider bindings are not exposed here.
message Agent {
  // id is the agent's UUID.
  string id = 1;
  // campaign_id is the owning campaign's UUID.
  string campaign_id = 2;
  // role is the agent archetype: "butler" or "character" (ADR-0009).
  string role = 3;
  // name is the agent's display name (and primary address term).
  string name = 4;
  // title is the role subtitle shown under the name (e.g. "Gruff innkeeper").
  string title = 5;
  // persona is the markdown personality/backstory/speech style injected into the
  // prompt.
  string persona = 6;
  // voice is the selected voice id (empty when unset). The encrypted TTS provider
  // binding is not exposed.
  string voice = 7;
  // address_only: the agent waits to be named (ADR-0024). Always true for the
  // Butler.
  bool address_only = 8;
  // speaker_color is the stable palette SLOT the web tier maps onto its speaker
  // palette, so each roster member renders in a stable hue across reloads.
  uint32 speaker_color = 9;
  // aliases are extra name/aliases for Address Detection beyond name.
  repeated string aliases = 10;
}

// GetCampaignRosterRequest is the (empty) request for GetCampaignRoster; the
// active campaign is resolved server-side for the single operator.
message GetCampaignRosterRequest {}

// GetCampaignRosterResponse carries the active campaign and its ordered roster.
message GetCampaignRosterResponse {
  // campaign is the active campaign (title is its name; plus system/language).
  Campaign campaign = 1;
  // roster is the campaign's agents in stable order: the Butler first, then the
  // Character NPCs.
  repeated Agent roster = 2;
}

// CreateAgentRequest is the editor's "Add NPC" payload. The role is always
// 'character' and the campaign is resolved server-side, so neither is carried.
message CreateAgentRequest {
  // name is the new NPC's display name (e.g. "New NPC").
  string name = 1;
  // title is the role subtitle.
  string title = 2;
  // persona is the markdown personality/backstory/speech style.
  string persona = 3;
  // voice is the selected voice id (empty when unset).
  string voice = 4;
  // address_only: the NPC waits to be named (ADR-0024).
  bool address_only = 5;
  // aliases are extra address terms beyond name.
  repeated string aliases = 6;
}

// CreateAgentResponse carries the created Character NPC, including its
// server-assigned speaker-colour slot.
message CreateAgentResponse {
  // agent is the newly created NPC.
  Agent agent = 1;
}

// UpdateAgentRequest carries an agent's editor fields. address_only is ignored
// for the Butler (kept true). Unknown id fails with CodeNotFound.
message UpdateAgentRequest {
  // id is the agent to update.
  string id = 1;
  // name is the agent's display name.
  string name = 2;
  // title is the role subtitle.
  string title = 3;
  // persona is the markdown personality/backstory/speech style.
  string persona = 4;
  // voice is the selected voice id (empty when unset).
  string voice = 5;
  // address_only: the agent waits to be named; ignored for the Butler (ADR-0024).
  bool address_only = 6;
  // aliases are extra address terms beyond name.
  repeated string aliases = 7;
}

// UpdateAgentResponse carries the updated agent.
message UpdateAgentResponse {
  // agent is the updated agent.
  Agent agent = 1;
}

// DeleteAgentRequest names the agent to delete. Deleting the Butler fails with
// CodeFailedPrecondition (ADR-0009).
message DeleteAgentRequest {
  // id is the agent to delete.
  string id = 1;
}

// DeleteAgentResponse is the (empty) response for DeleteAgent.
message DeleteAgentResponse {}

// ProviderService backs the Configuration screen (#68; ADR-0004 BYOK /
// ADR-0039 single-operator). Credentials are WRITE-ONLY after save: a saved
// secret's plaintext is NEVER returned over any RPC — responses carry only the
// last 4 characters (last4) plus metadata, so the screen renders a masked value
// and a "last updated" without ever reading a secret back.
service ProviderService {
  // ListProviderConfigs returns the operator's saved Configuration: the three
  // write-only credentials (Discord bot token, Groq, ElevenLabs) as masked
  // metadata, plus the non-secret Discord Guild / Voice channel IDs. It is a
  // read (NO_SIDE_EFFECTS), so the CSRF check is skipped.
  rpc ListProviderConfigs(ListProviderConfigsRequest) returns (ListProviderConfigsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // SaveProviderConfig seals and stores one BYOK provider key (Groq or
  // ElevenLabs) and returns only its masked metadata. Replacing an existing key
  // updates its last4 + updated_at. State-changing: auth + CSRF guard it.
  rpc SaveProviderConfig(SaveProviderConfigRequest) returns (SaveProviderConfigResponse);
  // SaveDiscordSettings stores the Discord deployment integration: the Bot token
  // (a write-only secret, sealed at rest) and the non-secret Guild / Voice
  // channel IDs. An omitted bot_token leaves the stored token unchanged, so the
  // IDs can be saved without re-entering the secret. State-changing.
  rpc SaveDiscordSettings(SaveDiscordSettingsRequest) returns (SaveDiscordSettingsResponse);
  // ResolveGuildInvite resolves a pasted Discord invite code to its Guild and
  // that Guild's voice channels, using the decrypted saved deployment Bot token
  // server-side (#105, ADR-0047). The SPA extracts the bare code from the pasted
  // link (parseDiscordLink, zero network) and sends it here — the URL never
  // crosses the wire. It is a no-side-effects read (CSRF-exempt), consistent with
  // the other management reads: an invalid/expired code fails with CodeNotFound;
  // a Guild the Bot is not a member of fails with CodeFailedPrecondition; a
  // missing saved Bot token also fails with CodeFailedPrecondition.
  rpc ResolveGuildInvite(ResolveGuildInviteRequest) returns (ResolveGuildInviteResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // GetSpendCaps returns the operator's two per-Tenant spend caps (#130,
  // ADR-0046): the soft and hard USD thresholds, each absent when unset. It is a
  // read (NO_SIDE_EFFECTS), so the CSRF check is skipped.
  rpc GetSpendCaps(GetSpendCapsRequest) returns (GetSpendCapsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // SetSpendCaps stores the operator's two per-Tenant spend caps (#130): each
  // omitted field clears that cap. A negative value is rejected with
  // InvalidArgument, and when both are set hard must be >= soft (else
  // InvalidArgument). Caps snapshot at the NEXT Voice Session start — a mid-session
  // edit never changes the running session. State-changing: auth + CSRF guard it.
  rpc SetSpendCaps(SetSpendCapsRequest) returns (SetSpendCapsResponse);
}

// SpendCaps is the wire view of a Tenant's two spend caps (#130, ADR-0046). Each
// field is absent (no presence) when that cap is unset; both figures are USD
// ESTIMATES, never billed amounts.
message SpendCaps {
  // soft_usd refuses NEW Agent turns once estimated spend crosses it (in-flight
  // turns finish, transcription continues). Absent when unset.
  optional double soft_usd = 1;
  // hard_usd ends the Voice Session cleanly once estimated spend crosses it. Absent
  // when unset. When both are set, hard_usd >= soft_usd (enforced at SetSpendCaps).
  optional double hard_usd = 2;
}

// GetSpendCapsRequest is the (empty) request; the tenant is resolved server-side.
message GetSpendCapsRequest {}

// GetSpendCapsResponse carries the operator's current caps.
message GetSpendCapsResponse {
  SpendCaps caps = 1;
}

// SetSpendCapsRequest carries the caps to store; an omitted field clears that cap.
message SetSpendCapsRequest {
  // soft_usd / hard_usd: present to set, absent to clear. Negative is rejected;
  // both present requires hard_usd >= soft_usd.
  optional double soft_usd = 1;
  optional double hard_usd = 2;
}

// SetSpendCapsResponse echoes the stored caps after the save.
message SetSpendCapsResponse {
  SpendCaps caps = 1;
}

// ProviderCredential is the WRITE-ONLY view of a saved secret: never its value,
// only the last 4 characters and whether/when it was saved (ADR-0004). The
// Configuration screen renders a masked field, a "last updated", and a Healthy /
// Key-needed badge from these fields alone.
message ProviderCredential {
  // component is the credential's primary Component label ("llm", "tts") or
  // "discord" for the Bot token. Display/identity only — not the storage enum.
  string component = 1;
  // provider identifies the credential slot ("groq", "elevenlabs", "discord").
  string provider = 2;
  // ever_saved is true once a real key has been stored. An unsaved slot, or one
  // still holding the seed's ENV placeholder, is false → the screen shows
  // "Key needed".
  bool ever_saved = 3;
  // show_masked tells the screen to render the masked value + Replace button
  // (true exactly when ever_saved).
  bool show_masked = 4;
  // last4 is the last 4 characters of the saved secret — the only plaintext
  // kept (empty when never saved).
  string last4 = 5;
  // model is the selected model/voice id for the provider (empty for Discord).
  string model = 6;
  // updated_at is when the credential was last saved (unset when never saved).
  google.protobuf.Timestamp updated_at = 7;
}

// ListProviderConfigsRequest is the (empty) request; the tenant is resolved
// server-side from the session.
message ListProviderConfigsRequest {}

// ListProviderConfigsResponse carries the three write-only credentials plus the
// non-secret Discord IDs the screen edits.
message ListProviderConfigsResponse {
  // credentials are the Discord bot token, Groq, and ElevenLabs slots.
  repeated ProviderCredential credentials = 1;
  // guild_id is the Discord server the Bot serves (non-secret; may be empty).
  string guild_id = 2;
  // voice_channel_id is the channel sessions join (non-secret; may be empty).
  string voice_channel_id = 3;
  // discord_application_id is the Discord application (client) id backing
  // operator login (ADR-0016), reused for the bot-authorization URL; non-secret;
  // empty when DISCORD_OAUTH_CLIENT_ID unset.
  string discord_application_id = 4;
}

// SaveProviderConfigRequest seals one BYOK provider key.
message SaveProviderConfigRequest {
  // provider is the BYOK slot to save: "groq" or "elevenlabs".
  string provider = 1;
  // secret is the plaintext API key to seal. Write-only: never returned. An
  // EMPTY secret with existing stored rows is a model-only update (#227): the
  // stored ciphertext is re-upserted verbatim and only model changes — safe to
  // key on emptiness because an empty string is never a valid API key. Empty
  // secret with no stored rows is rejected (a model alone cannot create a
  // credential slot); empty secret AND empty model is a read-back no-op.
  string secret = 2;
  // model is the selected model id (optional; free-text — it need not appear
  // in the ListModels catalog, #227).
  string model = 3;
}

// SaveProviderConfigResponse returns the saved key's masked metadata.
message SaveProviderConfigResponse {
  // credential is the saved key's write-only view (never its value).
  ProviderCredential credential = 1;
}

// SaveDiscordSettingsRequest stores the Discord deployment integration.
message SaveDiscordSettingsRequest {
  // bot_token is the Discord Bot token to seal. Omit (no presence) to leave the
  // stored token unchanged — lets the IDs be saved without re-entering the
  // secret. Write-only: never returned.
  optional string bot_token = 1;
  // guild_id / voice_channel_id are the non-secret Discord IDs. Omit both (no
  // presence) to leave the stored IDs unchanged — lets the token be replaced
  // without clobbering the IDs (#142). When present they must be non-empty and
  // sent together; a present-but-empty ID is rejected (mirrors bot_token).
  optional string guild_id = 2;
  optional string voice_channel_id = 3;
}

// SaveDiscordSettingsResponse returns the Bot token's masked metadata plus the
// stored IDs after the save.
message SaveDiscordSettingsResponse {
  // credential is the Bot token's write-only view after the save.
  ProviderCredential credential = 1;
  string guild_id = 2;
  string voice_channel_id = 3;
}

// ResolveGuildInviteRequest carries the bare Discord invite code the SPA
// extracted from a pasted invite link (parseDiscordLink, zero network), NOT the
// full URL. The server validates ^[A-Za-z0-9-]{2,64}$ and path-escapes it before
// the REST call (#105, ADR-0047).
message ResolveGuildInviteRequest {
  // invite_code is the bare invite code (e.g. "abc123"), not the full URL.
  string invite_code = 1;
}

// VoiceChannel is one selectable Discord voice channel in the resolved Guild:
// its snowflake and human-readable name. Only type-2 GUILD_VOICE channels are
// returned — text, category, and stage channels are excluded (ADR-0047).
message VoiceChannel {
  // id is the channel's snowflake.
  string id = 1;
  // name is the channel's human-readable name.
  string name = 2;
}

// ResolveGuildInviteResponse carries the resolved Guild and its voice channels,
// sorted by Discord position then name.
message ResolveGuildInviteResponse {
  // guild_id is the resolved Guild's snowflake.
  string guild_id = 1;
  // guild_name is the resolved Guild's display name.
  string guild_name = 2;
  // voice_channels are the Guild's GUILD_VOICE channels, sorted by position then
  // name; empty when the Guild has none.
  repeated VoiceChannel voice_channels = 3;
}

// SessionService drives the live Voice Session from the Session screen (#72,
// ADR-0039): an in-process SessionManager starts/stops the voice loop in `all`
// mode — the control RPC is defined, not looped through a backplane (ADR-0005).
// The Bot's guild/voice channel come from the saved deployment config, not CLI
// flags; the credential-bridge keys (#69) drive the loop.
service SessionService {
  // GetSession returns the current Voice Session for the active campaign — the
  // running session when one is live, otherwise the most recent ended one (for
  // the screen's last-session summary) — and whether voice is active. It is a
  // read (NO_SIDE_EFFECTS), so the CSRF check is skipped.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // StartSession launches the voice loop for the active campaign and returns the
  // created running session. It fails with CodeFailedPrecondition when the
  // Discord guild/channel are unconfigured, and CodeAlreadyExists when a session
  // is already active. State-changing: auth + CSRF guard it.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  // StopSession cancels the active voice loop and returns the ended session. It
  // fails with CodeFailedPrecondition when no session is active. State-changing.
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  // SetAgentMute mutes or unmutes one Agent of the Active Campaign in the live
  // Voice Session (#211), returning the resulting muted-Agent id set. It fails
  // with CodeFailedPrecondition when no Voice Session is active, and CodeNotFound
  // when agent_id is not an Agent of the Active Campaign. State-changing: the auth
  // + CSRF interceptors guard it exactly like the other session mutations.
  rpc SetAgentMute(SetAgentMuteRequest) returns (SetAgentMuteResponse);
  // SetAllMute mutes or unmutes EVERY Agent of the Active Campaign in the live
  // Voice Session (#211) — the Mute all / Unmute all button — returning the
  // resulting muted-Agent id set. It fails with CodeFailedPrecondition when no
  // Voice Session is active. State-changing.
  rpc SetAllMute(SetAllMuteRequest) returns (SetAllMuteResponse);
  // SearchTranscriptLines returns the operator's Active Campaign transcript Lines
  // whose text matches the query, ranked by relevance (#120, ADR-0011 amendment).
  // It backs the Session screen's transcript search box and shares ONE query path
  // (storage.SearchTranscriptLines) with `/glyphoxa search` (AC4). The Campaign is
  // resolved server-side — the active Voice Session's campaign when live, else the
  // Active Campaign — never a client-supplied id, so it never crosses into another
  // campaign's transcript (AC5). An empty/whitespace query is CodeInvalidArgument.
  // It is a read (NO_SIDE_EFFECTS), so the CSRF check is exempt.
  rpc SearchTranscriptLines(SearchTranscriptLinesRequest) returns (SearchTranscriptLinesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // ListSessions returns the operator's past Voice Sessions for the resolved
  // Active Campaign, newest-first (started_at DESC, id DESC), capped at a fixed
  // server limit (#270). It backs the Session screen's past-session picker: the
  // operator picks a prior session to replay its persisted transcript. The
  // Campaign is resolved server-side exactly like SearchTranscriptLines (the live
  // Voice Session's campaign when one runs, else the durable /glyphoxa use
  // selection, else the most-recent fallback) — NEVER a client-supplied id, so it
  // can never list another campaign's sessions. A never-run state yields an empty
  // list, not an error. It is a read (NO_SIDE_EFFECTS), so the CSRF check is exempt.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // GenerateRecap regenerates a Butler-flavored Recap over the given sessions
  // (#271: never persisted). Every session_id must belong to the resolved
  // Active Campaign (cross-campaign/unparsable -> CodeNotFound). Deliberately
  // NOT NO_SIDE_EFFECTS: each call spends provider money + records usage, so
  // CSRF + auth guard it like a mutation.
  rpc GenerateRecap(GenerateRecapRequest) returns (GenerateRecapResponse);
}

// GenerateRecapRequest carries the Voice Session ids to recap; each must belong
// to the server-resolved Active Campaign (ADR-0039) — a cross-campaign or
// unparsable id is CodeNotFound (existence never leaked).
message GenerateRecapRequest {
  // session_ids are the Voice Sessions to summarize into one recap.
  repeated string session_ids = 1;
}

// GenerateRecapResponse carries the regenerated recap prose, the recapped
// session ids (chronological), and whether any session took the map-reduce
// (windowed) path.
message GenerateRecapResponse {
  // text is the Butler-flavored recap prose.
  string text = 1;
  // session_ids are the recapped sessions in chronological (started_at) order.
  repeated string session_ids = 2;
  // windowed reports whether any session was map-reduced over windows.
  bool windowed = 3;
}

// ListSessionsRequest is the (empty) request; the Active Campaign is resolved
// server-side (single operator, ADR-0039) — the client never supplies a campaign id.
message ListSessionsRequest {}

// ListSessionsResponse carries the campaign's past Voice Sessions newest-first
// (started_at DESC, id DESC), capped by the server's fixed listSessionsLimit.
message ListSessionsResponse {
  // sessions are the campaign's Voice Sessions, newest-first, including the
  // running one when a session is live.
  repeated VoiceSession sessions = 1;
}

// TranscriptLineMatch is one transcript-search hit (#120): the rendered Line's
// speaker/tag/kind, its instant and text, plus the owning session + stable line
// id the web uses to deep-link and highlight the exact line in the Session screen.
message TranscriptLineMatch {
  // session_id is the Voice Session the matched Line belongs to.
  string session_id = 1;
  // line_id is the relay's stable Line.ID ("u:<n>" / "a:<turn>") — the key the
  // web scrolls-to / highlights in the rendered transcript.
  string line_id = 2;
  // who is the speaker label (e.g. "Bart", "Player / DM").
  string who = 3;
  // tag is the optional pill (e.g. "NPC"); empty when none.
  string tag = 4;
  // kind is the line kind ∈ {gm,player,npc,butler} (ADR-0039), for styling.
  string kind = 5;
  // ts is when the Line was spoken.
  google.protobuf.Timestamp ts = 6;
  // text is the rendered Line text (the matched content).
  string text = 7;
}

// SearchTranscriptLinesRequest carries the operator's raw search query; the
// Active Campaign is resolved server-side (single operator, ADR-0039). An
// empty/whitespace query is rejected with CodeInvalidArgument.
message SearchTranscriptLinesRequest {
  // query is the operator's raw keyword search over the transcript.
  string query = 1;
}

// SearchTranscriptLinesResponse carries the matching Lines in relevance rank order.
message SearchTranscriptLinesResponse {
  // lines are the matching transcript Lines, ranked by relevance.
  repeated TranscriptLineMatch lines = 1;
}

// VoiceSession is the wire view of a voice_sessions row (#72): the Bot's
// presence in one Discord voice channel, bound to a campaign.
message VoiceSession {
  // id is the voice session's UUID.
  string id = 1;
  // campaign_id is the campaign the session runs for.
  string campaign_id = 2;
  // status is the lifecycle state: "running", "ended", or "failed" (#123).
  string status = 3;
  // started_at is when the session started.
  google.protobuf.Timestamp started_at = 4;
  // ended_at is when the session ended; unset while running.
  google.protobuf.Timestamp ended_at = 5;
  // line_count is how many transcript lines the session produced (0 this stage;
  // the live transcript feed is #73).
  uint32 line_count = 6;
  // end_reason is the readable cause an abnormal end carries: the fatal gateway
  // rejection reason for a "failed" session (#123), or the reconciled reason for a
  // boot-orphaned row (#143). Empty for a clean "ended" stop and while running.
  string end_reason = 7;
}

// GetSessionRequest is the (empty) request; the active campaign and the
// in-process session are resolved server-side for the single operator.
message GetSessionRequest {}

// GetSessionResponse carries the current session and whether voice is active.
message GetSessionResponse {
  // session is the running session, or the most recent ended one; unset when no
  // session has ever run for the active campaign.
  VoiceSession session = 1;
  // active is true exactly when a voice loop is running in this process.
  bool active = 2;
  // muted_agent_ids are the currently-muted Agents' ids (#211), set ONLY while a
  // Voice Session is active — the reload truth for a mid-session page reload
  // (AC5). Empty when idle (a new session starts all-unmuted).
  repeated string muted_agent_ids = 3;
  // spend_cap_state is the live session's spend-cap state (#130, ADR-0046): "soft"
  // once the soft cap is crossed (new turns refused), "hard" once the hard cap is
  // crossed (the session is ending), "" otherwise. Set only while active; the
  // reload truth for the Session screen's spend-cap-reached badge.
  string spend_cap_state = 4;
  // estimated_spend_usd is the live session's accumulated spend ESTIMATE in USD
  // (#130) — an approximate figure the screen labels "estimated", never a billed
  // amount. 0 when idle or no caps are configured.
  double estimated_spend_usd = 5;
}

// SetAgentMuteRequest toggles one Agent's mute in the live Voice Session (#211).
message SetAgentMuteRequest {
  // agent_id is the Agent (Butler or Character NPC) of the Active Campaign to
  // mute or unmute.
  string agent_id = 1;
  // muted turns the mute on (true) or off (false).
  bool muted = 2;
}

// SetAgentMuteResponse carries the muted-Agent id set after the change.
message SetAgentMuteResponse {
  // muted_agent_ids are the currently-muted Agents' ids after the toggle.
  repeated string muted_agent_ids = 1;
}

// SetAllMuteRequest mutes or unmutes every Agent of the Active Campaign (#211).
message SetAllMuteRequest {
  // muted turns every Agent's mute on (true) or off (false).
  bool muted = 1;
}

// SetAllMuteResponse carries the muted-Agent id set after the change.
message SetAllMuteResponse {
  // muted_agent_ids are the currently-muted Agents' ids after the toggle.
  repeated string muted_agent_ids = 1;
}

// StartSessionRequest is the (empty) request; the active campaign is resolved
// server-side for the single operator.
message StartSessionRequest {}

// StartSessionResponse carries the created running session.
message StartSessionResponse {
  // session is the newly started running session.
  VoiceSession session = 1;
}

// StopSessionRequest is the (empty) request; the active session is resolved from
// the in-process manager.
message StopSessionRequest {}

// StopSessionResponse carries the ended session.
message StopSessionResponse {
  // session is the session that was just ended.
  VoiceSession session = 1;
}

// VoiceService backs the LIVE provider data the Configuration and Campaign
// screens render (#70; ADR-0039 single-operator / ADR-0004 BYOK credential
// bridge). It exposes the ElevenLabs voice catalog and a short voice preview for
// the voice selects, the live Groq model catalog for the model select, and an async
// provider-health signal that upgrades the Configuration badges from
// key-presence to a real tested status. Every live call uses the operator's
// decrypted tenant key; the read RPCs are NO_SIDE_EFFECTS so the SPA probes them
// as queries that render after the page (CSRF-exempt).
service VoiceService {
  // ListVoices returns the ElevenLabs voice catalog (live ListVoices via the
  // decrypted tenant key; cassette/fixture-deterministic in tests, ADR-0021).
  // It feeds the Campaign voice select. Read (NO_SIDE_EFFECTS).
  rpc ListVoices(ListVoicesRequest) returns (ListVoicesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // PreviewVoice synthesizes a short TTS sample for a chosen voice + sample text
  // and returns playable audio (wraps the existing Synthesize). It spends
  // provider quota, so unlike the reads it is auth + CSRF guarded like a
  // mutation.
  rpc PreviewVoice(PreviewVoiceRequest) returns (PreviewVoiceResponse);
  // ListModels returns the LIVE model catalog for a provider (#227): Groq's
  // OpenAI-compatible surface exposes GET /models, so the catalog is fetched
  // with the tenant key — DefaultModel pinned first, rest sorted. A fetch
  // failure degrades to just the default (never an error), because the model
  // field is free-text and the Configuration screen must stay usable
  // (ADR-0039, amended 2026-07-06).
  // Read (NO_SIDE_EFFECTS).
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // GetProviderHealth runs the async test-calls — ElevenLabs /v1/voices, a Groq
  // ping, and a live Discord gateway login that resolves the bot tag — and
  // returns per-provider status plus that tag. The screen renders key-presence
  // instantly, then upgrades from this. Read (NO_SIDE_EFFECTS).
  rpc GetProviderHealth(GetProviderHealthRequest) returns (GetProviderHealthResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// Voice is the wire view of one selectable TTS voice (ADR-0022/0023). It carries
// the vendor voice id the agent persists plus a display label for the select.
message Voice {
  // provider is the owning TTS provider id (e.g. "elevenlabs").
  string provider = 1;
  // voice_id is the vendor-side voice identifier persisted on the agent.
  string voice_id = 2;
  // name is the human-readable voice name (e.g. "Marcus").
  string name = 3;
  // language is a BCP-47 hint (e.g. "en"); optional.
  string language = 4;
  // label is the display string for the select (e.g. "ElevenLabs · Marcus").
  string label = 5;
}

// ListVoicesRequest is the (empty) request; the tenant key is resolved
// server-side.
message ListVoicesRequest {}

// ListVoicesResponse carries the live voice catalog.
message ListVoicesResponse {
  // voices is the provider's voice catalog for the select.
  repeated Voice voices = 1;
}

// PreviewVoiceRequest asks for a short spoken sample of one voice.
message PreviewVoiceRequest {
  // voice_id is the vendor voice to synthesize with.
  string voice_id = 1;
  // text is the sample line to speak; the server supplies a default when empty.
  string text = 2;
}

// PreviewVoiceResponse carries the synthesized sample as a self-contained audio
// blob the browser can play directly.
message PreviewVoiceResponse {
  // audio is the encoded sample (a WAV container around the PCM sample).
  bytes audio = 1;
  // sample_rate is the audio sample rate in Hz.
  int32 sample_rate = 2;
  // channels is the channel count (1 = mono).
  int32 channels = 3;
  // mime_type is the IANA media type of audio (e.g. "audio/wav").
  string mime_type = 4;
}

// ListModelsRequest names the provider whose model catalog to return.
message ListModelsRequest {
  // provider is the LLM provider slot (e.g. "groq").
  string provider = 1;
}

// ListModelsResponse carries the live model catalog (#227).
message ListModelsResponse {
  // models is the fetched list of selectable model ids (first is the default;
  // free-text entries outside this list are also valid).
  repeated string models = 1;
}

// HealthStatus is the tested liveness of a provider credential.
enum HealthStatus {
  // HEALTH_STATUS_UNSPECIFIED is the not-yet-tested / unknown state.
  HEALTH_STATUS_UNSPECIFIED = 0;
  // HEALTH_STATUS_HEALTHY means the test-call succeeded.
  HEALTH_STATUS_HEALTHY = 1;
  // HEALTH_STATUS_DEGRADED means the test-call failed (bad key, unreachable, …).
  HEALTH_STATUS_DEGRADED = 2;
}

// ProviderHealth is one provider's tested status, upgrading the screen's badge
// from key-presence to a real signal.
message ProviderHealth {
  // provider is the slot tested ("groq", "elevenlabs", "discord").
  string provider = 1;
  // status is the tested liveness.
  HealthStatus status = 2;
  // detail is a short human-readable note (an error summary when degraded).
  string detail = 3;
  // bot_tag is the resolved Discord bot tag from the live gateway login
  // (e.g. "Glyphoxa#4823"); set only on the "discord" entry.
  string bot_tag = 4;
}

// GetProviderHealthRequest is the (empty) request; the tenant is resolved
// server-side.
message GetProviderHealthRequest {}

// GetProviderHealthResponse carries the per-provider tested health.
message GetProviderHealthResponse {
  // providers is the tested status for each credential slot.
  repeated ProviderHealth providers = 1;
}

// Character is a Player Character (PC) played by one Discord User (#276, E4,
// ADR-0003). discord_user_id is mandatory (Players are scoped via the Characters
// they play, not Tenant membership); linked_user_id is the dormant Discord-OAuth
// link and is empty until the Player first signs in. aliases feed Address
// Detection like an Agent's aliases.
message Character {
  // id is the server-assigned Character id.
  string id = 1;
  // name is the Character's display name.
  string name = 2;
  // aliases are alternate names Address Detection also matches.
  repeated string aliases = 3;
  // discord_user_id is the Discord snowflake of the Player (mandatory).
  string discord_user_id = 4;
  // linked_user_id is the linked Glyphoxa user id, empty until Discord OAuth.
  string linked_user_id = 5;
}

// ListCharactersRequest is the (empty) request; the campaign is resolved
// server-side (ADR-0039).
message ListCharactersRequest {}

// ListCharactersResponse carries the active campaign's Player Characters.
message ListCharactersResponse {
  // characters is the campaign's PC roster in display order.
  repeated Character characters = 1;
}

// CreateCharacterRequest carries a new Player Character's editor fields; the
// campaign is resolved server-side.
message CreateCharacterRequest {
  // name is required (empty is CodeInvalidArgument).
  string name = 1;
  // aliases are optional alternate names.
  repeated string aliases = 2;
  // discord_user_id must be a Discord snowflake (decimal digits only).
  string discord_user_id = 3;
}

// CreateCharacterResponse carries the created Player Character.
message CreateCharacterResponse {
  Character character = 1;
}

// UpdateCharacterRequest is a full-field save; discord_user_id may rebind the
// Character to a different Discord User (it stays required).
message UpdateCharacterRequest {
  // id addresses the Character to update.
  string id = 1;
  // name is required (empty is CodeInvalidArgument).
  string name = 2;
  // aliases replace the Character's alias set.
  repeated string aliases = 3;
  // discord_user_id must be a Discord snowflake (decimal digits only).
  string discord_user_id = 4;
}

// UpdateCharacterResponse carries the updated Player Character.
message UpdateCharacterResponse {
  Character character = 1;
}

// DeleteCharacterRequest addresses the Player Character to delete.
message DeleteCharacterRequest {
  string id = 1;
}

// DeleteCharacterResponse is empty.
message DeleteCharacterResponse {}

// DiscordVoiceMember is one Discord User currently in the operator's voice
// channel (#279): the snowflake id to bind a Character to, a display name, and
// an avatar URL for the picker row.
message DiscordVoiceMember {
  // discord_user_id is the Discord snowflake to bind.
  string discord_user_id = 1;
  // display_name is the member's guild display name (nickname → username).
  string display_name = 2;
  // avatar_url is the member's effective avatar URL (may be empty).
  string avatar_url = 3;
}

// ListDiscordVoiceMembersRequest is the (empty) request; the voice channel is
// resolved server-side from the deployment config (ADR-0039).
message ListDiscordVoiceMembersRequest {}

// ListDiscordVoiceMembersResponse carries the voice-channel occupants; empty
// when the Bot is offline or no channel is configured (the UI falls back to
// free-text snowflake entry).
message ListDiscordVoiceMembersResponse {
  // members are the Discord Users currently in the voice channel.
  repeated DiscordVoiceMember members = 1;
}
