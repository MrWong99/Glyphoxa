name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            cmake g++ gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build whisper.cpp (amd64)
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          cd /tmp/whisper-src
          cmake -B build-amd64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF \
            -DGGML_NATIVE=OFF
          cmake --build build-amd64 --config Release -j$(nproc)
          mkdir -p /tmp/whisper/include /tmp/whisper/amd64/lib
          cp include/whisper.h /tmp/whisper/include/
          cp -r ggml/include/* /tmp/whisper/include/ 2>/dev/null || true
          find build-amd64 -name '*.a' -exec cp {} /tmp/whisper/amd64/lib/ \;

      - name: Build whisper.cpp (arm64)
        run: |
          cd /tmp/whisper-src
          cmake -B build-arm64 \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF \
            -DGGML_NATIVE=OFF
          cmake --build build-arm64 --config Release -j$(nproc)
          mkdir -p /tmp/whisper/arm64/lib
          find build-arm64 -name '*.a' -exec cp {} /tmp/whisper/arm64/lib/ \;

      - name: Build opus (arm64)
        run: |
          git clone --depth 1 --branch v1.5.2 https://github.com/xiph/opus.git /tmp/opus-src
          cd /tmp/opus-src
          cmake -B build-arm64 \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DOPUS_BUILD_TESTING=OFF \
            -DOPUS_BUILD_PROGRAMS=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/opus/arm64
          cmake --build build-arm64 --config Release -j$(nproc)
          cmake --install build-arm64

      - name: Download libdave (amd64)
        run: |
          DAVE_VERSION="v1.1.1/cpp"
          curl -fsL "https://github.com/discord/libdave/releases/download/${DAVE_VERSION}/libdave-Linux-X64-boringssl.zip" \
            -o /tmp/libdave-amd64.zip
          mkdir -p /tmp/dave/include /tmp/dave/amd64/lib /tmp/dave/amd64/lib/pkgconfig
          unzip -j -o /tmp/libdave-amd64.zip "include/dave/dave.h" -d /tmp/dave/include
          unzip -j -o /tmp/libdave-amd64.zip "lib/libdave.so" -d /tmp/dave/amd64/lib
          cat > /tmp/dave/amd64/lib/pkgconfig/dave.pc <<'PCEOF'
          prefix=/tmp/dave
          exec_prefix=${prefix}
          libdir=/tmp/dave/amd64/lib
          includedir=${prefix}/include

          Name: dave
          Description: Discord Audio & Video End-to-End Encryption (DAVE) Protocol
          Version: 1.1.1
          Libs: -L${libdir} -ldave -Wl,-rpath,${libdir}
          Cflags: -I${includedir}
          PCEOF
          rm -f /tmp/libdave-amd64.zip

      - name: Download libdave (arm64)
        run: |
          DAVE_VERSION="v1.1.1/cpp"
          curl -fsL "https://github.com/discord/libdave/releases/download/${DAVE_VERSION}/libdave-Linux-ARM64-boringssl.zip" \
            -o /tmp/libdave-arm64.zip
          mkdir -p /tmp/dave/arm64/lib /tmp/dave/arm64/lib/pkgconfig
          unzip -j -o /tmp/libdave-arm64.zip "lib/libdave.so" -d /tmp/dave/arm64/lib
          cat > /tmp/dave/arm64/lib/pkgconfig/dave.pc <<'PCEOF'
          prefix=/tmp/dave
          exec_prefix=${prefix}
          libdir=/tmp/dave/arm64/lib
          includedir=${prefix}/include

          Name: dave
          Description: Discord Audio & Video End-to-End Encryption (DAVE) Protocol
          Version: 1.1.1
          Libs: -L${libdir} -ldave -Wl,-rpath,${libdir}
          Cflags: -I${includedir}
          PCEOF
          rm -f /tmp/libdave-arm64.zip

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker images are built and pushed by .github/workflows/docker.yml,
      # which triggers on both main-branch pushes and v* tags.
