name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR / branch so we don't burn minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Lint, format-check, breaking-check, and (on merge to main) PUSH the proto
  # module to the BSR via the official buf-action (ADR-0039). On pull_request it
  # posts a summary comment; on push-to-main it runs `buf push` to publish
  # buf.build/glyphoxa/glyphoxa. Independent of codegen (this action does NOT
  # generate) — the `proto` job below owns stub generation.
  buf:
    name: buf (lint + breaking + push)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # buf-action posts a PR summary comment
    steps:
      - uses: actions/checkout@v7
      # Pinned (not floating @v1) so an action release can't change what CI
      # enforces — or publishes — without a reviewed bump.
      - uses: bufbuild/buf-action@v1.4.0
        with:
          token: ${{ secrets.BUF_REGISTRY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # Generate the protobuf/Connect/ES stubs exactly ONCE per push, in an
  # authenticated job, and fan them out as an artifact (ADR-0039 codegen).
  # Generate-only: lint/format/breaking live in the `buf` job above. gen/ is
  # gitignored (NOT committed): buf.gen.yaml drives REMOTE BSR plugins
  # (protocolbuffers/go, connectrpc/go, bufbuild/es), which are rate-limited
  # unless authed — so buf authenticates here via BUF_TOKEN once, and every
  # downstream Go-compiling job + the Docker build CONSUMES the uploaded gen/
  # rather than re-running buf (no per-job BSR hits, no buf/node in the image).
  proto:
    name: proto (generate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned buf CLI (not @latest) so a buf release can't change what CI
      # generates without a reviewed bump. Matches the local 1.66.0.
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1.50.0
        with:
          version: 1.66.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # buf authenticates to the BSR via BUF_TOKEN. The remote plugins in
      # buf.gen.yaml are rate-limited for anonymous callers; the operator-
      # provisioned BUF_REGISTRY_TOKEN secret lifts that for this authed job.
      - name: Generate stubs
        run: buf generate
        env:
          BUF_TOKEN: ${{ secrets.BUF_REGISTRY_TOKEN }}

      # Upload the gen/ tree as `gen`. With a single `path: gen`, the artifact's
      # least-common-ancestor is gen/, so its internal layout is
      # glyphoxa/... (the gen/ prefix is stripped). Downstream jobs
      # download with `path: gen`, restoring ./gen/glyphoxa/... — the exact
      # import path the generated Go (go_package .../gen/glyphoxa/...) needs.
      - name: Upload gen artifact
        uses: actions/upload-artifact@v7
        with:
          name: gen
          path: gen
          retention-days: 1
          if-no-files-found: error

  # Build the Vite + React SPA and run its vitest suite (ADR-0013/0039). Depends
  # on `proto` because the SPA's typed Connect client imports the generated
  # gen/ts/* stubs (gen/ is gitignored, produced once by `proto` and fanned out
  # as the `gen` artifact — same pattern as the Go `test` job). The Go `test` job
  # keeps compiling without a node step because the committed placeholder
  # internal/spa/dist/index.html satisfies the //go:embed; the `image`/`e2e`
  # docker builds instead download the `spa-dist` artifact this job uploads, so
  # the shipped image embeds the REAL console (#114, ADR-0034).
  web:
    name: web (vite build + vitest)
    needs: [proto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The SPA imports the generated TS client from gen/ts/*; restore the stubs
      # produced once by the `proto` job before `npm ci`/build (gen/ is gitignored).
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      - name: Install deps
        run: npm ci
        working-directory: web

      # vite.config.ts builds into ../internal/spa/dist (build.outDir), so the
      # real bundle lands where Go's //go:embed picks it up. That directory is
      # the artifact the docker-build jobs consume (#114, ADR-0034 amendment).
      - name: Build SPA
        run: npm run build
        working-directory: web

      # Fan the real built bundle out so the `image`/`e2e` docker builds embed
      # the console instead of the committed placeholder index.html — exactly the
      # `gen` artifact pattern above, but for the SPA. Uploading internal/spa/dist
      # (not just dist/) keeps the download landing back at the same path.
      - name: Upload spa-dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: spa-dist
          path: internal/spa/dist
          retention-days: 1
          if-no-files-found: error

      - name: Test
        run: npm run test
        working-directory: web

  test:
    name: build + vet + test
    needs: [proto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Restore the generated stubs (produced once by the `proto` job) BEFORE
      # any go build/vet/test — gen/ is gitignored, so without this the module
      # doesn't compile. `path: gen` lands files at ./gen/glyphoxa/...
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      - name: Build
        run: go build ./...

      # The static-binary guarantee (#468, re-scoped by the libopus encoder
      # revert, ADR-0034 amendment 2026-07-19): the production binary links ONE
      # native lib — libopus, the outbound Opus encoder (pion/opus's encoder is
      # below speech-quality parity) — so CGO is ON but the link must still be
      # fully static; that property is what lets the container image stay FROM
      # scratch. netgo/osusergo force the pure-Go resolvers (static glibc
      # getaddrinfo would dlopen NSS libs that don't exist in scratch). Any
      # dynamically-linked dependency fails here, on the fast PR gate, before
      # it reaches the image build. Mirrors the Dockerfile's build invocation.
      - name: Install libopus (static-link dep of the opus tag)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libopus-dev
      - name: Static build assertion (CGO, fully static link)
        run: |
          CGO_ENABLED=1 go build -tags "opus dave nolibopusfile netgo osusergo" -ldflags '-extldflags "-static -lm"' -o /tmp/glyphoxa-static ./cmd/glyphoxa
          if ! ldd /tmp/glyphoxa-static 2>&1 | grep -q 'not a dynamic executable'; then
            echo "FAIL: binary is dynamically linked — the static-link property behind the scratch image regressed:"
            ldd /tmp/glyphoxa-static
            exit 1
          fi
          echo "binary is fully static"

      - name: Vet (default)
        run: go vet ./...

      - name: Vet (record tag)
        run: go vet -tags=record ./...

      # Default suite stays Docker-free and fast (ADR-0021): the persistence
      # testcontainers tests are tag-isolated behind `integration` (ADR-0033)
      # and excluded here. They run in the separate `integration` job below.
      - name: Test
        run: go test -race ./...

  integration:
    name: integration (Postgres / testcontainers)
    needs: [proto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Restore the generated stubs before any go build/test (gen/ is gitignored).
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      # The DB tests (ADR-0033, `//go:build integration`) stand up a real
      # Postgres via testcontainers — the ubuntu-latest runner ships a Docker
      # daemon, which testcontainers-go drives directly (no `services:` block
      # needed). This job is the auditable "did the DB tests actually run?"
      # gate the ADR requires, kept off the default PR suite.
      - name: Integration test (with Docker)
        # -timeout 20m: the storage suite spins one pgvector container per test
        # (per-test isolation, ADR-0033) and has outgrown go test's default
        # 10-minute PER-PACKAGE timeout on slower machines. The generous bound
        # only moves the flake ceiling; a hung test still fails the job.
        run: go test -race -tags=integration -timeout 20m ./...

  audio:
    name: audio (opus + bench)
    needs: [proto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Restore the generated stubs before any go build/test (gen/ is gitignored).
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      # The opus codec (`//go:build opus`) links the system libopus again for
      # the OUTBOUND encoder (hraban/opus, CGO; pion/opus stays decode-only
      # until its encoder reaches speech-quality parity — ADR-0034 amendment
      # 2026-07-19), so the job installs libopus-dev. `nolibopusfile` keeps
      # hraban/opus from also requiring libopusfile (unused). The DAVE build
      # (`//go:build dave`) is still pure Go (dave-go). This is the ADR-0033
      # "audio builds" job that keeps the live binary from silently breaking
      # while the default suite stays lean (codec/DAVE stubbed).
      - name: Install libopus (CGO dep of the opus tag)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libopus-dev

      - name: Build + vet (opus + dave tags)
        run: |
          go build -tags "opus dave nolibopusfile" ./...
          go vet -tags "opus dave nolibopusfile" ./...

      # The opus-tagged unit tests (real codec round-trip, PlaybackSource
      # concurrency, the speech-quality SNR gate) are deterministic and keyless
      # (ADR-0021), gated behind `//go:build opus`, so the default PR gate
      # never compiles them. Run them HERE — separate from build+vet for
      # concern clarity (#374). `-race` because codec/PlaybackSource pulls
      # cross-goroutine. Targeted at the two packages that own opus-gated
      # tests (mixdown decode, wire codec).
      - name: Test (opus tags)
        run: go test -race -tags "opus nolibopusfile" ./internal/mixdown/... ./pkg/voice/wire/...

      # The cassette-tier latency benchmark (Epic C): real silero VAD + codec,
      # cassettes for the network providers — keyless (no secrets, ADR-0021).
      # The VAD is pure Go since #468 (no ONNX Runtime, no CGO), but the bench
      # stays HERE, off the default PR gate (ADR-0033 addendum), for wall-time.
      # It replays the corpus and diffs each stage's p95 against the committed
      # baseline (Report.CheckRegression); absolute SLOs are the live tier's job.
      - name: Cassette latency benchmark (regression gate)
        run: go test -race -tags "bench opus nolibopusfile" -run '^TestBench_CassetteRegression$' ./pkg/voice/voicebench/

  image:
    name: container image (build + smoke)
    # `web` is added so its `spa-dist` artifact (the real built console) exists
    # to download into the build context before the docker build — otherwise the
    # image embeds the committed placeholder index.html (#114, ADR-0034).
    needs: [proto, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The Dockerfile does `COPY . .` then `go build` — gen/ is gitignored and
      # NOT generated inside the image (no buf/node in the builder), so it must
      # be present in the build CONTEXT. Restore it here BEFORE the docker build;
      # .dockerignore does not exclude gen/, so `COPY . .` picks it up.
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      # Same story for the SPA bundle: the real Vite build is context-fed, not
      # built in the image (ADR-0034 amendment). Restore the `web` job's
      # `spa-dist` into internal/spa/dist so `COPY . .` + //go:embed ship the
      # real console; .dockerignore does not exclude internal/spa/dist.
      - name: Download spa-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: spa-dist
          path: internal/spa/dist

      # buildx + layer caching keeps the image build off the critical
      # path on warm caches. This is a
      # SEPARATE job from the fast `test` gate (ADR-0033): the heavy image build
      # must not slow an unrelated PR's unit feedback.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build the single image (ADR-0034) and LOAD it into the local daemon so
      # the smoke test can `docker run` it. No push on PRs — publishing happens
      # only on release (release-image.yml).
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: glyphoxa:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The executable acceptance spec for issue #31 (scratch image since
      # #468): migrate --help exits 0; the binary is fully static (ldd: "not a
      # dynamic executable"); the image has no shell but does carry CA certs;
      # and the image config sets a non-root user.
      - name: Container smoke test
        run: ./scripts/container-smoke.sh glyphoxa:smoke

      # The smoke test's embedded-console check must itself be trusted (the same
      # #140 lesson the helm-validate self-test enforces): assert it FAILS on a
      # placeholder-only image and PASSES only on a real build, so the gate can't
      # silently no-op if the artifact wiring above ever regresses.
      - name: Container smoke self-test
        run: ./scripts/container-smoke-test.sh

  helm:
    name: helm chart (lint + unittest + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The fast, cluster-free gate for the deploy chart (ADR-0034, issue #34):
      # template-time correctness only. The real cluster e2e (helm install →
      # Postgres Ready → migrate Job Completed) is issue #37's job and is NOT run
      # here, so an unrelated PR's chart feedback stays seconds, not minutes.
      # Helm >= 3.18 is required: helm-unittest v1.1.1's plugin.yaml uses the
      # `platformHooks` field, which older Helm (<= 3.17) refuses to parse,
      # leaving the plugin installed-but-unusable. Keep these two pins in step.
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.18.4

      # helm-unittest renders the templates and asserts the hook ordering,
      # images, and Secret wiring (deploy/charts/glyphoxa/tests/*). Pinned (not
      # @latest) so a plugin release can't silently change what CI enforces.
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      # kubeconform validates the rendered manifests against the upstream
      # Kubernetes JSON schemas — the structural gate `helm lint`/unittest don't
      # provide. Pinned release binary, fetched without piping a script to a shell.
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint
        run: helm lint deploy/charts/glyphoxa

      - name: Helm unittest
        run: helm unittest deploy/charts/glyphoxa

      # Render every value path the chart supports — with the CI dummy values
      # (deploy/charts/glyphoxa/ci/ci-values.yaml): the chart has `required`
      # values, so a bare render fails by design — and schema-validate each.
      # scripts/helm-validate.sh renders to a file (a render error fails the
      # gate directly) and requires a non-zero validated-resource count. The
      # former inline pipes had no pipefail and kubeconform exits 0 on empty
      # stdin, so this gate had validated zero manifests since #42 (#140).
      - name: Render + kubeconform
        run: scripts/helm-validate.sh

      # The gate must itself be trusted: assert it fails on a failing render
      # and on an empty render — the two silent-pass modes of #140.
      - name: helm-validate self-test
        run: scripts/helm-validate-test.sh

      # The SaaS install/update scripts (deploy/saas/): their --dry-run paths
      # generate the values file the chart is installed with, so their
      # self-tests belong with the chart gates — they helm-template the
      # generated values against the local chart (both admission modes) and
      # pin the version-decision logic. Offline: no cluster, no network.
      - name: saas install script self-test
        run: deploy/saas/install-test.sh

      - name: saas update script self-test
        run: deploy/saas/update-test.sh

  e2e:
    name: deploy e2e (k3d smoke)
    # Wait for the `image` job so its cache-to (mode=max) has populated the gha
    # cache: this job's build is then a cache HIT (load layers, no recompile)
    # rather than a second full image build. The serialization costs a little wall-time but halves the expensive
    # build per run. The real cluster e2e is issue #37's gate — deliberately a
    # SEPARATE job from the fast `test` suite (ADR-0033) so the heavy image build
    # + cluster spin-up never slows unit feedback.
    # `image` stays for cache ordering; `proto` is added because this job runs
    # its OWN docker build and so needs gen/ in its build context too. `web` is
    # added for the same reason with the SPA: this job's build must embed the
    # real console, so it downloads the `spa-dist` artifact too (#114).
    needs: [image, proto, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The web-tier HTTP assertions in the smoke (#128 real-console + OAuth flow)
      # must themselves be trusted (the same #140/#114 lesson): assert they FAIL
      # on a placeholder page or a broken OAuth handler and PASS only on a correct
      # one, against a cluster-free local fixture. Runs first so a regressed gate
      # fails fast, before the multi-minute image build + k3d spin-up below.
      - name: Deploy smoke self-test (web HTTP assertions)
        run: ./scripts/e2e-deploy-smoke-test.sh

      # Restore the generated stubs into the build context (gen/ is gitignored,
      # not generated inside the image) before this job's own docker build.
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      # Restore the real SPA bundle into the build context too (context-fed, not
      # built in the image — ADR-0034) so this job's docker build embeds the
      # console, not the placeholder.
      - name: Download spa-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: spa-dist
          path: internal/spa/dist

      # Rebuild the single image (ADR-0034) from the warm gha cache and LOAD it
      # into the local daemon so k3d can import it. cache-from only (no cache-to)
      # — the `image` job owns the cache write, so the two never race on it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: glyphoxa:e2e
          cache-from: type=gha

      # Helm >= 3.18 for platformHooks parity with the `helm` job (kept in step
      # with the helm-unittest pin there).
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.18.4

      # Pinned release binary, fetched without piping a script to a shell (same
      # discipline as the kubeconform install in the `helm` job).
      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d \
            https://github.com/k3d-io/k3d/releases/download/v5.7.5/k3d-linux-amd64
          sudo install -m 0755 /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Create k3d cluster
        run: k3d cluster create glyphoxa-e2e --wait --timeout 120s

      - name: Import image into k3d
        run: k3d image import glyphoxa:e2e -c glyphoxa-e2e

      # helm install (ordered hook chain: Postgres → migrate → seed → voice
      # Available) + the /readyz assertion, then release teardown. No live Discord
      # creds: the resilience fix (#44) keeps the pod serving the DB-backed
      # /readyz so the Deployment reaches Available with a placeholder token.
      - name: Deploy smoke test
        run: ./scripts/e2e-deploy-smoke.sh
        env:
          RELEASE: glyphoxa-e2e
          NAMESPACE: glyphoxa-e2e
          IMAGE_REPO: glyphoxa
          IMAGE_TAG: e2e
          TIMEOUT: 300s

      - name: Delete k3d cluster
        if: always()
        run: k3d cluster delete glyphoxa-e2e || true

  lint:
    name: golangci-lint
    needs: [proto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Restore the generated stubs before the lint run (gen/ is gitignored;
      # golangci-lint type-checks the module, so it must compile).
      - name: Download gen artifact
        uses: actions/download-artifact@v8
        with:
          name: gen
          path: gen

      # Install golangci-lint v2 from source rather than via the official
      # action: the action's v6 release pins golangci-lint v1, which can't
      # parse the v2 config in .golangci.yml and refuses to run against
      # Go 1.26 modules. Building from source under the same Go toolchain
      # used for the project sidesteps both problems and keeps the lint
      # binary's "built with" version aligned with the project target.
      # Pinned (not @latest) so a new lint release can't change what CI
      # enforces — or what code it runs — without a reviewed bump.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run ./...
