name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR / branch so we don't burn minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # pkg/voice/vad/silero downloads libonnxruntime.so on first use and
      # extracts it under $XDG_CACHE_HOME/glyphoxa/onnxruntime/<version>.
      # Caching saves ~30 MB and the GitHub-runner → upstream round-trip on
      # every run. Keyed on the silero runtime.go file so a version bump
      # invalidates automatically.
      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      - name: Build
        run: go build ./...

      - name: Vet (default)
        run: go vet ./...

      - name: Vet (record tag)
        run: go vet -tags=record ./...

      # Default suite stays Docker-free and fast (ADR-0021): the persistence
      # testcontainers tests are tag-isolated behind `integration` (ADR-0033)
      # and excluded here. They run in the separate `integration` job below.
      - name: Test
        run: go test -race ./...

  integration:
    name: integration (Postgres / testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      # The DB tests (ADR-0033, `//go:build integration`) stand up a real
      # Postgres via testcontainers — the ubuntu-latest runner ships a Docker
      # daemon, which testcontainers-go drives directly (no `services:` block
      # needed). This job is the auditable "did the DB tests actually run?"
      # gate the ADR requires, kept off the default PR suite.
      - name: Integration test (with Docker)
        run: go test -race -tags=integration ./...

  audio:
    name: audio / CGO (opus + bench)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      # The opus codec (`//go:build opus`) links the system libopus via
      # github.com/hraban/opus → pkg-config opus, paired with `nolibopusfile`
      # so libopusfile isn't required (codec.go header). This is the ADR-0033
      # "CGO/audio builds" job that keeps the live binary from silently breaking
      # while the default suite stays CGO-light (codec stubbed).
      - name: Install libopus
        run: sudo apt-get update && sudo apt-get install -y libopus-dev pkg-config

      - name: Build + vet (opus tags)
        run: |
          go build -tags "opus nolibopusfile" ./...
          go vet -tags "opus nolibopusfile" ./...

      # The cassette-tier latency benchmark (Epic C): real silero VAD + codec,
      # cassettes for the network providers — keyless (no secrets, ADR-0021) but
      # CGO, so it runs HERE, not in the default no-CGO gate (ADR-0033 addendum).
      # It replays the corpus and diffs each stage's p95 against the committed
      # baseline (Report.CheckRegression); an absolute SLO is the live tier's job.
      - name: Cassette latency benchmark (regression gate)
        run: go test -tags "bench opus nolibopusfile" -run '^TestBench_CassetteRegression$' ./pkg/voice/voicebench/

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # Install golangci-lint v2 from source rather than via the official
      # action: the action's v6 release pins golangci-lint v1, which can't
      # parse the v2 config in .golangci.yml and refuses to run against
      # Go 1.26 modules. Building from source under the same Go toolchain
      # used for the project sidesteps both problems and keeps the lint
      # binary's "built with" version aligned with the project target.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...
