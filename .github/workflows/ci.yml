name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  # ---------------------------------------------------------------------------
  # Build whisper.cpp static library (shared across jobs via artifacts)
  # ---------------------------------------------------------------------------
  whisper-build:
    name: Build whisper.cpp
    runs-on: ubuntu-latest
    steps:
      - name: Cache whisper.cpp build
        id: cache-whisper
        uses: actions/cache@v5
        with:
          path: /tmp/whisper-install
          key: whisper-cpp-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Build whisper.cpp
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake g++
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          cd /tmp/whisper-src
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF
          cmake --build build --config Release -j$(nproc)
          mkdir -p /tmp/whisper-install/include /tmp/whisper-install/lib
          cp include/whisper.h /tmp/whisper-install/include/
          cp -r ggml/include/* /tmp/whisper-install/include/ 2>/dev/null || true
          find build -name '*.a' -exec cp {} /tmp/whisper-install/lib/ \;

      - name: Upload whisper artifacts
        uses: actions/upload-artifact@v7
        with:
          name: whisper-libs
          path: /tmp/whisper-install
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Download ONNX Runtime shared library (shared across jobs via artifacts)
  # ---------------------------------------------------------------------------
  onnx-setup:
    name: Download ONNX Runtime
    runs-on: ubuntu-latest
    steps:
      - name: Cache ONNX Runtime
        id: cache-onnx
        uses: actions/cache@v5
        with:
          path: /tmp/onnx-install
          key: onnxruntime-${{ runner.os }}-${{ runner.arch }}-v1.24.3

      - name: Download ONNX Runtime
        if: steps.cache-onnx.outputs.cache-hit != 'true'
        run: |
          curl -fsL "https://github.com/microsoft/onnxruntime/releases/download/v1.24.3/onnxruntime-linux-x64-1.24.3.tgz" \
            -o /tmp/onnxruntime.tgz
          mkdir -p /tmp/onnx-install
          tar xzf /tmp/onnxruntime.tgz -C /tmp/onnx-install --strip-components=1
          rm -f /tmp/onnxruntime.tgz

      - name: Upload ONNX Runtime artifacts
        uses: actions/upload-artifact@v7
        with:
          name: onnx-libs
          path: /tmp/onnx-install
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Download libdave prebuilt shared library (shared across jobs via artifacts)
  # ---------------------------------------------------------------------------
  dave-setup:
    name: Download libdave
    runs-on: ubuntu-latest
    steps:
      - name: Cache libdave
        id: cache-dave
        uses: actions/cache@v5
        with:
          path: /tmp/dave-install
          key: libdave-${{ runner.os }}-${{ runner.arch }}-v1.1.1

      - name: Download libdave prebuilt
        if: steps.cache-dave.outputs.cache-hit != 'true'
        run: |
          DAVE_VERSION="v1.1.1/cpp"
          DAVE_URL="https://github.com/discord/libdave/releases/download/${DAVE_VERSION}/libdave-Linux-X64-boringssl.zip"
          curl -fsL "$DAVE_URL" -o /tmp/libdave.zip
          mkdir -p /tmp/dave-install/include /tmp/dave-install/lib /tmp/dave-install/lib/pkgconfig
          unzip -j -o /tmp/libdave.zip "include/dave/dave.h" -d /tmp/dave-install/include
          unzip -j -o /tmp/libdave.zip "lib/libdave.so" -d /tmp/dave-install/lib
          cat > /tmp/dave-install/lib/pkgconfig/dave.pc <<'PCEOF'
          prefix=/tmp/dave-install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: dave
          Description: Discord Audio & Video End-to-End Encryption (DAVE) Protocol
          Version: 1.1.1
          Libs: -L${libdir} -ldave -Wl,-rpath,${libdir}
          Cflags: -I${includedir}
          PCEOF
          rm -f /tmp/libdave.zip

      - name: Upload dave artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dave-libs
          path: /tmp/dave-install
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [whisper-build, onnx-setup, dave-setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download whisper artifacts
        uses: actions/download-artifact@v8
        with:
          name: whisper-libs
          path: /tmp/whisper-install

      - name: Download ONNX Runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: onnx-libs
          path: /tmp/onnx-install

      - name: Download dave artifacts
        uses: actions/download-artifact@v8
        with:
          name: dave-libs
          path: /tmp/dave-install

      - name: Set native library environment
        run: |
          echo "C_INCLUDE_PATH=/tmp/whisper-install/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/tmp/whisper-install/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/tmp/dave-install/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/dave-install/lib:/tmp/onnx-install/lib" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV

      - name: Check formatting
        run: |
          gofmt -l .
          if [ -n "$(gofmt -l .)" ]; then
            echo "error: files are not formatted; run 'gofmt -w .' and commit"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [whisper-build, onnx-setup, dave-setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download whisper artifacts
        uses: actions/download-artifact@v8
        with:
          name: whisper-libs
          path: /tmp/whisper-install

      - name: Download ONNX Runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: onnx-libs
          path: /tmp/onnx-install

      - name: Download dave artifacts
        uses: actions/download-artifact@v8
        with:
          name: dave-libs
          path: /tmp/dave-install

      - name: Set native library environment
        run: |
          echo "C_INCLUDE_PATH=/tmp/whisper-install/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/tmp/whisper-install/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/tmp/dave-install/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/dave-install/lib:/tmp/onnx-install/lib" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV

      - name: Install C++ runtime
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Run tests
        run: go test -race -count=1 -timeout 10m ./...

  test-cover:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download whisper artifacts
        uses: actions/download-artifact@v8
        with:
          name: whisper-libs
          path: /tmp/whisper-install

      - name: Download ONNX Runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: onnx-libs
          path: /tmp/onnx-install

      - name: Download dave artifacts
        uses: actions/download-artifact@v8
        with:
          name: dave-libs
          path: /tmp/dave-install

      - name: Set native library environment
        run: |
          echo "C_INCLUDE_PATH=/tmp/whisper-install/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/tmp/whisper-install/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/tmp/dave-install/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/dave-install/lib:/tmp/onnx-install/lib" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV

      - name: Install C++ runtime
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests with coverage and JUnit output
        run: >-
          gotestsum
          --junitfile junit.xml
          --format testdox
          -- -race -count=1 -coverprofile=coverage.txt -timeout 10m ./...

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [whisper-build, onnx-setup, dave-setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download whisper artifacts
        uses: actions/download-artifact@v8
        with:
          name: whisper-libs
          path: /tmp/whisper-install

      - name: Download ONNX Runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: onnx-libs
          path: /tmp/onnx-install

      - name: Download dave artifacts
        uses: actions/download-artifact@v8
        with:
          name: dave-libs
          path: /tmp/dave-install

      - name: Set native library environment
        run: |
          echo "C_INCLUDE_PATH=/tmp/whisper-install/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/tmp/whisper-install/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/tmp/dave-install/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/dave-install/lib:/tmp/onnx-install/lib" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV

      - name: Install C++ runtime
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build
        run: go build -ldflags='-s -w' ./cmd/glyphoxa
