name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR / branch so we don't burn minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # pkg/voice/vad/silero downloads libonnxruntime.so on first use and
      # extracts it under $XDG_CACHE_HOME/glyphoxa/onnxruntime/<version>.
      # Caching saves ~30 MB and the GitHub-runner → upstream round-trip on
      # every run. Keyed on the silero runtime.go file so a version bump
      # invalidates automatically.
      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      - name: Build
        run: go build ./...

      - name: Vet (default)
        run: go vet ./...

      - name: Vet (record tag)
        run: go vet -tags=record ./...

      # Default suite stays Docker-free and fast (ADR-0021): the persistence
      # testcontainers tests are tag-isolated behind `integration` (ADR-0033)
      # and excluded here. They run in the separate `integration` job below.
      - name: Test
        run: go test -race ./...

  integration:
    name: integration (Postgres / testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      # The DB tests (ADR-0033, `//go:build integration`) stand up a real
      # Postgres via testcontainers — the ubuntu-latest runner ships a Docker
      # daemon, which testcontainers-go drives directly (no `services:` block
      # needed). This job is the auditable "did the DB tests actually run?"
      # gate the ADR requires, kept off the default PR suite.
      - name: Integration test (with Docker)
        run: go test -race -tags=integration ./...

  audio:
    name: audio / CGO (opus + bench)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Cache ONNX runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/glyphoxa/onnxruntime
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('pkg/voice/vad/silero/runtime.go') }}

      # The opus codec (`//go:build opus`) links the system libopus via
      # github.com/hraban/opus → pkg-config opus, paired with `nolibopusfile`
      # so libopusfile isn't required (codec.go header). This is the ADR-0033
      # "CGO/audio builds" job that keeps the live binary from silently breaking
      # while the default suite stays CGO-light (codec stubbed).
      - name: Install libopus
        run: sudo apt-get update && sudo apt-get install -y libopus-dev pkg-config

      - name: Build + vet (opus tags)
        run: |
          go build -tags "opus nolibopusfile" ./...
          go vet -tags "opus nolibopusfile" ./...

      # The cassette-tier latency benchmark (Epic C): real silero VAD + codec,
      # cassettes for the network providers — keyless (no secrets, ADR-0021) but
      # CGO, so it runs HERE, not in the default no-CGO gate (ADR-0033 addendum).
      # It replays the corpus and diffs each stage's p95 against the committed
      # baseline (Report.CheckRegression); an absolute SLO is the live tier's job.
      - name: Cassette latency benchmark (regression gate)
        run: go test -race -tags "bench opus nolibopusfile" -run '^TestBench_CassetteRegression$' ./pkg/voice/voicebench/

  image:
    name: container image (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # buildx + layer caching keeps the slow native build (whisper.cpp +
      # libopus + libdave + CGO) off the critical path on warm caches. This is a
      # SEPARATE job from the fast `test` gate (ADR-0033): the heavy image build
      # must not slow an unrelated PR's unit feedback.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the single image (ADR-0034) and LOAD it into the local daemon so
      # the smoke test can `docker run` it. No push on PRs — publishing happens
      # only on release (release-image.yml).
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: glyphoxa:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The executable acceptance spec for issue #31: migrate --help exits 0;
      # ldd resolves every native lib (libopus, libdave, libonnxruntime — no
      # "not found"); the bundled ONNX runtime exists at $GLYPHOXA_ONNX_LIB; and
      # the process runs as a non-root uid.
      - name: Container smoke test
        run: ./scripts/container-smoke.sh glyphoxa:smoke

  helm:
    name: helm chart (lint + unittest + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The fast, cluster-free gate for the deploy chart (ADR-0034, issue #34):
      # template-time correctness only. The real cluster e2e (helm install →
      # Postgres Ready → migrate Job Completed) is issue #37's job and is NOT run
      # here, so an unrelated PR's chart feedback stays seconds, not minutes.
      # Helm >= 3.18 is required: helm-unittest v1.1.1's plugin.yaml uses the
      # `platformHooks` field, which older Helm (<= 3.17) refuses to parse,
      # leaving the plugin installed-but-unusable. Keep these two pins in step.
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      # helm-unittest renders the templates and asserts the hook ordering,
      # images, and Secret wiring (deploy/charts/glyphoxa/tests/*). Pinned (not
      # @latest) so a plugin release can't silently change what CI enforces.
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      # kubeconform validates the rendered manifests against the upstream
      # Kubernetes JSON schemas — the structural gate `helm lint`/unittest don't
      # provide. Pinned release binary, fetched without piping a script to a shell.
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint
        run: helm lint deploy/charts/glyphoxa

      - name: Helm unittest
        run: helm unittest deploy/charts/glyphoxa

      # Render every value path the chart supports and schema-validate each.
      # -strict rejects unknown fields; the in-cluster path (4 docs) and the
      # external-DB path (postgres disabled, 2 docs) are both checked so neither
      # render branch can regress into an invalid manifest.
      - name: Render + kubeconform
        run: |
          helm template glyphoxa deploy/charts/glyphoxa \
            | kubeconform -strict -summary -kubernetes-version 1.30.0
          helm template glyphoxa deploy/charts/glyphoxa \
            --set postgres.enabled=false \
            --set database.url='postgres://u:p@external.example.com:5432/glyphoxa?sslmode=require' \
            | kubeconform -strict -summary -kubernetes-version 1.30.0

  e2e:
    name: deploy e2e (k3d smoke)
    # Wait for the `image` job so its cache-to (mode=max) has populated the gha
    # cache: this job's build is then a cache HIT (load layers, no recompile)
    # rather than a second full native build of the slow whisper/libdave/CGO
    # image. The serialization costs a little wall-time but halves the expensive
    # build per run. The real cluster e2e is issue #37's gate — deliberately a
    # SEPARATE job from the fast `test` suite (ADR-0033) so the heavy image build
    # + cluster spin-up never slows unit feedback.
    needs: [image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Rebuild the single image (ADR-0034) from the warm gha cache and LOAD it
      # into the local daemon so k3d can import it. cache-from only (no cache-to)
      # — the `image` job owns the cache write, so the two never race on it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: glyphoxa:e2e
          cache-from: type=gha

      # Helm >= 3.18 for platformHooks parity with the `helm` job (kept in step
      # with the helm-unittest pin there).
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      # Pinned release binary, fetched without piping a script to a shell (same
      # discipline as the kubeconform install in the `helm` job).
      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d \
            https://github.com/k3d-io/k3d/releases/download/v5.7.5/k3d-linux-amd64
          sudo install -m 0755 /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Create k3d cluster
        run: k3d cluster create glyphoxa-e2e --wait --timeout 120s

      - name: Import image into k3d
        run: k3d image import glyphoxa:e2e -c glyphoxa-e2e

      # helm install (ordered hook chain: Postgres → migrate → seed → voice
      # Available) + the /readyz assertion, then release teardown. No live Discord
      # creds: the resilience fix (#44) keeps the pod serving the DB-backed
      # /readyz so the Deployment reaches Available with a placeholder token.
      - name: Deploy smoke test
        run: ./scripts/e2e-deploy-smoke.sh
        env:
          RELEASE: glyphoxa-e2e
          NAMESPACE: glyphoxa-e2e
          IMAGE_REPO: glyphoxa
          IMAGE_TAG: e2e
          TIMEOUT: 300s

      - name: Delete k3d cluster
        if: always()
        run: k3d cluster delete glyphoxa-e2e || true

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # Install golangci-lint v2 from source rather than via the official
      # action: the action's v6 release pins golangci-lint v1, which can't
      # parse the v2 config in .golangci.yml and refuses to run against
      # Go 1.26 modules. Building from source under the same Go toolchain
      # used for the project sidesteps both problems and keeps the lint
      # binary's "built with" version aligned with the project target.
      # Pinned (not @latest) so a new lint release can't change what CI
      # enforces — or what code it runs — without a reviewed bump.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run ./...
