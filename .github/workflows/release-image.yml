name: release-image

# Publishes the single Glyphoxa OCI image (ADR-0034) to GitHub Container
# Registry on a release tag. The image tags match the goreleaser footer
# (.goreleaser.yml: `docker pull ghcr.io/mrwong99/glyphoxa:v{{ .Version }}`) and
# the issue-#31 requirement that the published image carry version + git SHA.
#
# Triggered by the same `v*` tags goreleaser releases on, so the binary archives
# (goreleaser) and the container image are cut from one tag. The `zhi-*` tags
# goreleaser ignores are excluded here too, for parity.
on:
  push:
    tags:
      - "v*"
      - "!zhi-*"

# Pushing to ghcr needs `packages: write`; `contents: read` to check out.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build + push image to ghcr
    runs-on: ubuntu-latest
    # Don't attempt to publish from forks (no package write, no intent).
    if: github.repository == 'MrWong99/Glyphoxa'
    steps:
      - uses: actions/checkout@v7

      # The Dockerfile does `COPY . .` then `go build` — gen/ is gitignored and
      # NOT generated inside the image (no buf/node in the builder), so it must
      # be present in the build CONTEXT. ci.yml's jobs restore it from the
      # `proto` job's artifact, but artifacts don't cross workflows, so this
      # workflow generates the stubs itself with the same pinned buf. Guarded by
      # internal/ci's workflow-invariant test (#139).
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1.50.0
        with:
          version: 1.66.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # The remote BSR plugins in buf.gen.yaml are rate-limited for anonymous
      # callers; BUF_TOKEN lifts that, exactly as in ci.yml's proto job.
      - name: Generate stubs
        run: buf generate
        env:
          BUF_TOKEN: ${{ secrets.BUF_REGISTRY_TOKEN }}

      # The SPA bundle is context-fed, not built in the image (ADR-0034
      # amendment, #114). ci.yml's docker-build jobs download the `spa-dist`
      # artifact ci.yml's `web` job uploads, but artifacts don't cross workflows
      # (same reason this workflow self-generates gen/ above), so publish builds
      # the SPA itself: Vite emits into internal/spa/dist (build.outDir), which
      # `COPY . .` then embeds. The build imports the generated gen/ts stubs, so
      # it must run AFTER `buf generate`.
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Build SPA
        run: npm run build
        working-directory: web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action derives the tag set from the git ref:
      #   - type=ref,event=tag → the literal tag, e.g. v1.2.3 (matches the
      #     goreleaser footer's ghcr.io/mrwong99/glyphoxa:v1.2.3).
      #   - type=sha,prefix= → the short git SHA, e.g. a1b2c3d (the "+ git SHA"
      #     half of issue #31's "version + git SHA").
      #   - latest only on a non-prerelease tag.
      # The repo is lowercased by the action, so MrWong99 → mrwong99 to match the
      # goreleaser footer's ghcr.io/mrwong99/glyphoxa.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/glyphoxa
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The PR `image` job (ci.yml) primes this gha cache, so the release
          # build reuses the slow native layers when the source matches.
          cache-from: type=gha
          cache-to: type=gha,mode=max
